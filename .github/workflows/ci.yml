# CI (testing-strategy.md §8): two jobs drawn from the unit/integration line in §3.1.
#   unit        - every push; needs nothing (no Docker, no services). Sub-minute.
#   integration - gated to pull requests; brings up the local Supabase stack, runs the schema
#                 suite (RLS + constraints + cascades). Heavier, so it gates merges, not pushes.
name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # Placeholder for PS-M1: the type-check over the shared types, fixtures, and schema tests.
      # The jest app/shared pure-function suites (PS-M2) and the deno-test Edge pure functions
      # (AOD-9/10/12) join this job when that code lands.
      - name: deno check
        run: deno check packages/shared/src test/fixtures supabase/tests

  integration:
    name: integration
    runs-on: ubuntu-latest
    # Gated: the stack-backed suite runs on pull requests, not every push.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps (pinned Supabase CLI)
        run: npm ci
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Start Supabase (local stack)
        run: npx supabase start
      - name: Schema suite (RLS + constraints + cascades)
        run: bash scripts/test-integration.sh
      - name: Stop Supabase
        if: always()
        run: npx supabase stop
