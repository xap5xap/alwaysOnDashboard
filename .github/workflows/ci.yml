# CI (testing-strategy.md §8): two jobs drawn from the unit/integration line in §3.1.
#   unit        - every push; needs nothing (no Docker, no services). Sub-minute.
#   integration - gated to pull requests; brings up the local Supabase stack, runs the schema
#                 suite (RLS + constraints + cascades). Heavier, so it gates merges, not pushes.
name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install workspace deps
        run: npm ci
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # Edge + shared: type-check the shared types, fixtures, schema tests, and the broker Functions.
      - name: deno check
        run: deno check packages/shared/src test/fixtures supabase/tests supabase/functions
      # The broker's pure functions (crypto, entitlements) need no stack, so they run on every push.
      # --allow-env: the AOD-78 env.test.ts suite snapshots + sets Deno.env in its beforeEach (no
      # network, no fs); without the flag deno hard-fails NotCapable in CI where nothing can prompt.
      - name: deno test (pure functions, no stack)
        run: deno test --allow-env supabase/functions/_shared
      # App (Expo/Metro): typecheck + jest (jest-expo) pure-function, component, and lifecycle suites,
      # including the @vela/shared Metro-half cross-runtime smoke (testing-strategy.md §3.2 / §9).
      - name: app typecheck (tsc)
        run: npm run typecheck:app
      - name: app unit tests (jest)
        run: npm test

  integration:
    name: integration
    runs-on: ubuntu-latest
    # Gated: the stack-backed suite runs on pull requests, not every push.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps (pinned Supabase CLI)
        run: npm ci
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Start Supabase (local stack)
        run: npx supabase start
      - name: Schema suite (RLS + constraints + cascades)
        run: bash scripts/test-integration.sh
      - name: Stop Supabase
        if: always()
        run: npx supabase stop
