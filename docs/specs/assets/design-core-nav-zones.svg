<svg width="100%" viewBox="0 0 860 600" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Vela navigation zones as screens: the auth gate, the splash, and the auth-gated transitions</title>
  <desc>Top: the three navigation zones drawn as device frames. The auth zone shows the Sign In auth card with the vela wordmark, two fields, and a primary button, tagged interior owned by AOD-29. The onboarding first-run frame shows a stepper, a connect-first-service prompt, and a primary button, also tagged AOD-29. The app zone shows the Dashboard home with the hub header and widget cards, tagged frame section 5. Bottom: the gate and transitions. Launch flows to a splash that shows a spinner while the session resolves, then to the index gate which reads useAuth and branches three ways: no session to the auth Sign In, session and first run to Onboarding, session and onboarded to the app Dashboard. A note states auth transitions replace the stack so there is no back entry into a stale auth state.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .h{font-size:16px;font-weight:700;fill:#F4F4F8;}
    .sub{font-size:11.5px;fill:#9B9BA8;}
    .sec{font-size:11px;font-weight:700;fill:#C9C9D4;letter-spacing:1px;}
    .cap{font-size:9px;font-weight:700;fill:#9B9BA8;letter-spacing:1px;}
    .title{font-size:13px;font-weight:600;fill:#F4F4F8;}
    .meta{font-size:10.5px;fill:#9B9BA8;}
    .acc{fill:#6E8BFF;font-weight:700;}
    .tok{font-size:9px;fill:#8A8A97;font-family:ui-monospace,Menlo,monospace;}
    .note{font-size:11px;fill:#C9C9D4;}
    .word{font-size:18px;font-weight:500;fill:#F4F4F8;letter-spacing:0.5px;}
    .cal{font-size:8.5px;fill:#8A8A97;font-family:ui-monospace,Menlo,monospace;}
    .on{fill:#FFFFFF;font-weight:700;}
    .node{font-size:11px;font-weight:600;fill:#F4F4F8;}
  </style>
  <rect x="0.5" y="0.5" width="859" height="599" rx="12" fill="#0B0B0F" stroke="#1E1E26"/>
  <text x="32" y="40" class="h">Navigation zones · the gate, the splash, the transitions</text>
  <text x="32" y="60" class="sub">Applies the AOD-17 zone model: signed-out sees one surface, signed-in sees everything. The gate routes; the shell frames.</text>

  <!-- ===== THE THREE ZONES ===== -->
  <text x="32" y="92" class="sec">THE THREE ZONES · drawn as screens</text>

  <!-- Frame A: (auth) Sign In -->
  <text x="32" y="112" class="cap">(auth) · SIGN IN</text>
  <rect x="32" y="120" width="248" height="240" rx="24" fill="#0B0B0F" stroke="#2A2A36"/>
  <rect x="48" y="146" width="216" height="172" rx="16" fill="#16161D" stroke="#2A2A36"/>
  <path d="M66,170 L68.5,175.5 L74,178 L68.5,180.5 L66,186 L63.5,180.5 L58,178 L63.5,175.5 Z" fill="#6E8BFF"/>
  <text x="82" y="183" class="word">vela</text>
  <text x="64" y="204" class="meta">Sign in to your dashboard</text>
  <rect x="64" y="214" width="184" height="28" rx="6" fill="#1F1F29" stroke="#2A2A36"/>
  <text x="76" y="232" class="meta">you@example.com</text>
  <rect x="64" y="250" width="184" height="28" rx="6" fill="#1F1F29" stroke="#2A2A36"/>
  <rect x="64" y="286" width="184" height="28" rx="8" fill="#6E8BFF"/>
  <text x="156" y="305" text-anchor="middle" class="on" font-size="12">Sign in</text>
  <text x="48" y="348" class="cal" fill="#6E8BFF">interior → AOD-29 · shell places it here</text>

  <!-- Frame B: Onboarding -->
  <text x="306" y="112" class="cap">ONBOARDING · first run (gated)</text>
  <rect x="306" y="120" width="248" height="240" rx="24" fill="#0B0B0F" stroke="#2A2A36"/>
  <circle cx="338" cy="158" r="4" fill="#6E8BFF"/>
  <circle cx="356" cy="158" r="4" fill="#2A2A36"/>
  <circle cx="374" cy="158" r="4" fill="#2A2A36"/>
  <text x="322" y="206" class="title">Connect your first service</text>
  <text x="322" y="226" class="meta">Pick what you want to glance at.</text>
  <rect x="322" y="244" width="216" height="40" rx="10" fill="#1F1F29" stroke="#2A2A36"/>
  <text x="338" y="269" class="title acc" font-size="12">Connect Linear</text>
  <rect x="322" y="296" width="120" height="30" rx="8" fill="#6E8BFF"/>
  <text x="382" y="316" text-anchor="middle" class="on" font-size="12">Get started</text>
  <text x="322" y="348" class="cal" fill="#6E8BFF">interior → AOD-29</text>

  <!-- Frame C: (app) Dashboard -->
  <text x="580" y="112" class="cap">(app) · DASHBOARD home</text>
  <rect x="580" y="120" width="248" height="240" rx="24" fill="#0B0B0F" stroke="#2A2A36"/>
  <path d="M602,150 L604.5,155.5 L610,158 L604.5,160.5 L602,166 L599.5,160.5 L594,158 L599.5,155.5 Z" fill="#6E8BFF"/>
  <text x="616" y="163" class="word" font-size="15">vela</text>
  <text x="730" y="160" class="acc" font-size="10" font-weight="700">Add</text>
  <text x="812" y="160" text-anchor="end" class="acc" font-size="10" font-weight="700">Settings</text>
  <line x1="596" y1="176" x2="812" y2="176" stroke="#2A2A36"/>
  <rect x="596" y="190" width="100" height="76" rx="10" fill="#16161D" stroke="#2A2A36"/>
  <rect x="712" y="190" width="100" height="76" rx="10" fill="#16161D" stroke="#2A2A36"/>
  <rect x="596" y="278" width="216" height="60" rx="10" fill="#16161D" stroke="#2A2A36"/>
  <text x="596" y="352" class="cal" fill="#6E8BFF">frame → §5 · cards reuse AOD-37</text>

  <!-- ===== THE GATE + TRANSITIONS ===== -->
  <text x="32" y="404" class="sec">THE GATE · index.tsx routes by (session, onboarded)</text>

  <!-- launch -->
  <rect x="32" y="424" width="80" height="34" rx="17" fill="#1F1F29" stroke="#2A2A36"/>
  <text x="72" y="446" text-anchor="middle" class="node">launch</text>
  <path d="M112,441 h26" stroke="#3A3A48" stroke-width="1.5"/><path d="M138,437 l6,4 l-6,4" fill="none" stroke="#3A3A48" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- splash -->
  <rect x="146" y="420" width="120" height="42" rx="10" fill="#16161D" stroke="#2A2A36"/>
  <circle cx="168" cy="441" r="7" fill="none" stroke="#6E8BFF" stroke-width="2" stroke-dasharray="22 10"/>
  <text x="182" y="438" class="meta" font-size="10">splash</text>
  <text x="182" y="451" class="cal">loading</text>
  <path d="M266,441 h26" stroke="#3A3A48" stroke-width="1.5"/><path d="M292,437 l6,4 l-6,4" fill="none" stroke="#3A3A48" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- gate -->
  <rect x="300" y="416" width="132" height="50" rx="10" fill="#101019" stroke="#6E8BFF" stroke-opacity="0.6"/>
  <text x="366" y="436" text-anchor="middle" class="node">index.tsx gate</text>
  <text x="366" y="452" text-anchor="middle" class="cal">reads useAuth()</text>

  <!-- three branches -->
  <path d="M432,432 C470,432 470,398 510,398" fill="none" stroke="#3A3A48" stroke-width="1.5"/><path d="M510,398 l-7,-3 l0,6 z" fill="#3A3A48"/>
  <text x="520" y="394" class="meta">no session</text>
  <text x="520" y="408" class="title acc" font-size="12">→ (auth) Sign In</text>

  <path d="M432,441 h74" fill="none" stroke="#3A3A48" stroke-width="1.5"/><path d="M506,441 l-7,-3 l0,6 z" fill="#3A3A48"/>
  <text x="520" y="437" class="meta">session · first run</text>
  <text x="520" y="451" class="title acc" font-size="12">→ Onboarding</text>

  <path d="M432,450 C470,450 470,484 510,484" fill="none" stroke="#3A3A48" stroke-width="1.5"/><path d="M510,484 l-7,-3 l0,6 z" fill="#3A3A48"/>
  <text x="520" y="480" class="meta">session · onboarded</text>
  <text x="520" y="494" class="title acc" font-size="12">→ (app) Dashboard</text>

  <!-- replace note block -->
  <rect x="32" y="486" width="464" height="70" rx="10" fill="#0E0E13" stroke="#22222C"/>
  <text x="48" y="508" class="note"><tspan fill="#6E8BFF" font-weight="700">Auth transitions replace the stack.</tspan></text>
  <text x="48" y="526" class="tok">Sign In → home (gate re-runs) · Onboarding → home · sign out → Sign In</text>
  <text x="48" y="542" class="tok">router.replace / &lt;Redirect&gt;: no back entry into a stale auth state (AOD-17 §6.1)</text>

  <line x1="32" y1="572" x2="828" y2="572" stroke="#22222C"/>
  <text x="32" y="590" class="note"><tspan fill="#6E8BFF" font-weight="700">Shell owns the gate, splash, and zone frames.</tspan> The Sign In and Onboarding interiors are AOD-29; the Dashboard is AOD-27.</text>
</svg>
