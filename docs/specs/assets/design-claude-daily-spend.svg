  <text x="32" y="92" class="sec">WIDE (3×1) · BANNER STRIP</text>
  <rect x="32" y="104" width="560" height="150" rx="14" fill="#16161D" stroke="#2A2A36"/>
  <text x="50" y="130" class="cap">CLAUDE · DAILY SPEND</text>
  <use href="#refresh" transform="translate(574 126)"/>
  <!-- total (supporting anchor) -->
  <text x="50"  y="190" font-size="17" class="symX">$</text>
  <text x="64"  y="190" font-size="28" class="dolX">97</text>
  <text x="102" y="190" font-size="17" class="ctsX">.50</text>
  <text x="50" y="208" class="mtd">MONTH TO DATE</text>
