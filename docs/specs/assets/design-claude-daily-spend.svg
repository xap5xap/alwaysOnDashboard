  <text x="358" y="544" class="anno"><tspan class="annob">Reuses AOD-37:</tspan> frame, quiet header + cluster (§4), the six states (§5), idle refresh (§6), overlay night (§7).</text>
  <text x="358" y="562" class="anno"><tspan class="annob">Bespoke to AOD-36:</tspan> the sparkline (§4) and the total + series composition; no new chrome or state.</text>
</svg>
