    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .h{font-size:15px;font-weight:700;fill:#F4F4F8;}
    .sub{font-size:11.5px;fill:#9B9BA8;}
    .sec{font-size:11px;font-weight:700;fill:#9B9BA8;letter-spacing:1px;}
    .cap{font-size:11px;font-weight:600;fill:#9B9BA8;letter-spacing:1px;}
    .axis{font-size:10.5px;fill:#8A8A97;}
    .axisb{font-size:10.5px;font-weight:700;fill:#F4F4F8;}
    .mtd{font-size:9.5px;font-weight:700;fill:#8A8A97;letter-spacing:1px;}
    .today{font-size:11px;font-weight:600;fill:#6E8BFF;font-variant:tabular-nums;}
    .empty{font-size:14px;font-weight:600;fill:#9B9BA8;}
    .emptysub{font-size:12px;fill:#8A8A97;}
    .anno{font-size:11.5px;fill:#C9C9D4;}
    .annob{font-size:11.5px;font-weight:700;fill:#F4F4F8;}
    .ph{font-size:12px;font-weight:700;fill:#F4F4F8;}
    .pb{font-size:11.5px;fill:#C9C9D4;}
    .pk{font-size:11.5px;font-weight:700;fill:#6E8BFF;}
    .lab{font-size:11px;font-weight:700;fill:#F4F4F8;}
    .labn{font-size:10.5px;fill:#8A8A97;}
    .symX{font-weight:700;fill:#F4F4F8;}
    .dolX{font-weight:700;fill:#F4F4F8;font-variant:tabular-nums;}
    .ctsX{font-weight:700;fill:#9B9BA8;font-variant:tabular-nums;}
    .barPast{fill:#6E8BFF;fill-opacity:0.5;}
    .barToday{fill:#6E8BFF;}
    .base{stroke:#2A2A36;stroke-width:1;}
    .eglyph{fill:#6E8BFF;fill-opacity:0.55;}
    .ebase{stroke:#6E8BFF;stroke-opacity:0.55;stroke-width:1.5;stroke-linecap:round;}
  </style>

  <defs>
    <g id="refresh" stroke="#9B9BA8" stroke-width="1.6" fill="none" stroke-linecap="round">
      <path d="M-7 -1 A7 7 0 1 1 -5 5"/><path d="M-7 -6 L-7 -1 L-2 -1"/>
    </g>
  </defs>

  <rect x="0.5" y="0.5" width="859" height="599" rx="12" fill="#0B0B0F" stroke="#1E1E26"/>
  <text x="32" y="38" class="h">Claude Daily Spend: the chart is the hero, the total supports it</text>
  <text x="32" y="58" class="sub">The sparkline (§4) applied across the two sizes. Inverts Spend MTD: here the series leads and the MTD total is the anchor. supportedSizes: wide, large.</text>

