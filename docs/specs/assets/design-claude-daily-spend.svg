  <text x="214" y="248" class="axis">Jun 1</text>
  <text x="564" y="248" text-anchor="end" class="axisb">Today</text>

  <!-- wide note -->
  <rect x="608" y="104" width="220" height="150" rx="12" fill="#121219" stroke="#2A2A36"/>
  <text x="626" y="128" class="ph">Banner composition</text>
  <text x="626" y="150" class="pb">Left: the MTD total, a</text>
  <text x="626" y="167" class="pb">supporting type.title anchor</text>
  <text x="626" y="184" class="pb">(equals Spend MTD's amount).</text>
  <text x="626" y="206" class="pb">Right: the sparkline strip,</text>
  <text x="626" y="223" class="pb">the hero. Today bright; all</text>
  <text x="626" y="240" class="pb">MTD days shown, bars flex.</text>

  <!-- ===== LARGE + EMPTY ===== -->
  <text x="32" y="288" class="sec">LARGE (2×2) · TALL CHART        ·        EMPTY STATE (days[] empty)</text>

  <!-- EMPTY (left) -->
  <rect x="32" y="300" width="288" height="172" rx="14" fill="#16161D" stroke="#2A2A36"/>
  <text x="50" y="326" class="cap">CLAUDE · DAILY SPEND</text>
  <use href="#refresh" transform="translate(302 322)"/>
  <!-- calm empty body: a flat 'empty chart' glyph -->
  <line x1="146" y1="392" x2="206" y2="392" class="ebase"/>
  <rect class="eglyph" x="150" y="388" width="8" height="4" rx="1.5"/>
  <rect class="eglyph" x="162" y="388" width="8" height="4" rx="1.5"/>
