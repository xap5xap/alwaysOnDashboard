  <text x="176" y="438" text-anchor="middle" class="emptysub">Costs appear as you use the API</text>
  <text x="32" y="492" class="lab">empty <tspan class="labn">· renderer-drawn (days[] empty), not a host state</tspan></text>

  <!-- empty-body convention note -->
  <rect x="32" y="506" width="288" height="80" rx="12" fill="#121219" stroke="#2A2A36"/>
  <text x="50" y="528" class="ph">Empty body — the AOD-35 convention</text>
  <text x="50" y="548" class="pb">Calm centred glyph + type.body textMuted line +</text>
  <text x="50" y="564" class="pb">subline. No action. AOD-36 is the 2nd consumer →</text>
  <text x="50" y="580" class="pb">promote into AOD-37 as a shared body (§9).</text>

