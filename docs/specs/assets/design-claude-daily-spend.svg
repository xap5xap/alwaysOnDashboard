<svg width="100%" viewBox="0 0 860 600" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Claude Daily Spend face: the sparkline at wide and large, the total + series composition, and the empty body</title>
  <desc>The Daily Spend card at its two supported sizes plus the empty state. At wide it is a banner: a quiet caption header and refresh cluster on top, the month-to-date total on the left as a supporting figure, and the sparkline filling the right as a horizontal strip with today bright and the earlier days receding. At large it is a roomy square: the caption header, a more prominent total, a taller sparkline filling the card with the today bar labelled with its value, and oldest-to-today axis endpoints. On this widget the chart is the hero and the total supports it, the inverse of Spend MTD where the number is the hero. The empty card shows the fresh-but-empty body the renderer draws when the days array is empty: a calm centred flat-chart glyph, a muted No spend yet this month line, and a quiet subline, with no action because nothing is wrong. A panel records that this is the second consumer of the AOD-35 empty-body convention and recommends promoting it into AOD-37.</desc>
