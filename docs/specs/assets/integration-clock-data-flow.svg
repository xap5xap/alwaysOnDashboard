<svg width="100%" viewBox="0 0 960 440" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Clock data flow: there is no flow (the authClass: none bookend)</title>
  <desc>A contrast diagram. The top band shows the pattern every other v1 service follows: the app client calls proxy, the Supabase Edge broker gates the connection, attaches the per-user secret, calls the provider API (Linear, Google, Open-Meteo, or Anthropic), normalizes the response, and caches it, returning normalized data to the client. The bottom band shows Clock, the only authClass none service: the user adds the widget with no connection (the addableWidgets exemption keys on authClass equals none), the widget host takes the none no-fetch path and makes no proxy call at all, rendering the card permanently Fresh with no proxy data, and the ClockCard leaf self-ticks from the device clock every second or every minute, formatting with Intl.DateTimeFormat for the zone and 12 or 24 hour. The Edge broker and every provider are never reached for a none widget. Clock has no BACKEND_REGISTRY entry, no OPERATION_REGISTRY entry, no proxy cache, and no env secret; the client ServiceDefinition is the entire registration.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .cap{font-size:13px;font-weight:600;fill:#1a1a1a;}
    .ts{font-size:11px;fill:#5b5b5b;}
    .bt{font-size:13px;font-weight:600;fill:#1a1a1a;}
    .bs{font-size:11px;fill:#4a4a4a;}
    .bt-faded{font-size:13px;font-weight:600;fill:#8a8a8a;}
    .bs-faded{font-size:11px;fill:#9a9a9a;}
    .lane{font-size:11px;font-weight:600;fill:#8a8a8a;}
    .note{font-size:10.5px;fill:#6a6a6a;}
    .edge{fill:none;stroke:#7a7a7a;stroke-width:1.5;}
    .edge-faded{fill:none;stroke:#b8b8b8;stroke-width:1.3;}
    .edge-dash{fill:none;stroke:#b0b0b0;stroke-width:1.4;stroke-dasharray:5 4;}
    .bg-blue{fill:#dce8fb;stroke:#6e97d6;stroke-width:1;}
    .bg-green{fill:#dcf3e3;stroke:#5aa97a;stroke-width:1.4;}
    .bg-gray{fill:#ededed;stroke:#b4b4b4;stroke-width:1;}
    .bg-faded{fill:#f4f4f4;stroke:#dadada;stroke-width:1;}
    .bg-dash{fill:#f7f7f7;stroke:#cfcfcf;stroke-width:1;stroke-dasharray:5 4;}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="959" height="439" rx="10" fill="#ffffff" stroke="#e6e6e6"/>
  <text x="32" y="30" class="cap">Clock data flow: there is no flow (the authClass: none bookend)</text>

  <!-- Band 1: the credentialed pattern (faded) -->
  <text x="32" y="56" class="lane">Every other v1 service (oauth2 / platform_key / admin_key): client to broker to provider</text>

  <rect x="32" y="70" width="250" height="66" rx="8" class="bg-faded"/>
  <text x="46" y="96" class="bt-faded">App client</text>
  <text x="46" y="114" class="bs-faded">WidgetHost: proxy(svc, widget, params)</text>

  <rect x="355" y="70" width="255" height="66" rx="8" class="bg-faded"/>
  <text x="369" y="96" class="bt-faded">Edge broker (AOD-9)</text>
  <text x="369" y="114" class="bs-faded">gate, secret, cache, OPERATION_REGISTRY</text>

  <rect x="683" y="70" width="245" height="66" rx="8" class="bg-faded"/>
  <text x="697" y="96" class="bt-faded">Provider API</text>
  <text x="697" y="114" class="bs-faded">Linear / Google / Open-Meteo / Anthropic</text>

  <path d="M282 96 H355" class="edge-faded" marker-end="url(#arrow)"/>
  <text x="318" y="90" text-anchor="middle" class="ts">proxy + JWT</text>
  <path d="M355 118 H282" class="edge-faded" marker-end="url(#arrow)"/>

  <path d="M610 96 H683" class="edge-faded" marker-end="url(#arrow)"/>
  <text x="646" y="90" text-anchor="middle" class="ts">fetch</text>
  <path d="M683 118 H610" class="edge-faded" marker-end="url(#arrow)"/>

  <text x="32" y="158" class="bs-faded">the credentialed pattern: a secret attached server-side, a real provider call, a normalized cache (AOD-9)</text>

  <!-- divider -->
  <path d="M32 178 H928" stroke="#e6e6e6" stroke-width="1"/>

  <!-- Band 2: Clock, client only (highlighted) -->
  <text x="32" y="200" class="lane">Clock (authClass: none): the bookend, client only, self-ticking</text>

  <rect x="32" y="216" width="250" height="78" rx="8" class="bg-gray"/>
  <text x="46" y="244" class="bt">Add widget (no connection)</text>
  <text x="46" y="262" class="bs">addableWidgets exemption:</text>
  <text x="46" y="278" class="bs">authClass === 'none'</text>

  <rect x="355" y="216" width="283" height="78" rx="8" class="bg-blue"/>
  <text x="369" y="240" class="bt">WidgetHost (AOD-8 §9)</text>
  <text x="369" y="257" class="bs">authClass:'none' no-fetch path:</text>
  <text x="369" y="273" class="bs">NO proxy fetch, permanent Fresh,</text>
  <text x="369" y="289" class="bs">no proxy data (section 6.3)</text>

  <rect x="688" y="216" width="212" height="78" rx="8" class="bg-green"/>
  <text x="702" y="240" class="bt">ClockCard (leaf)</text>
  <text x="702" y="257" class="bs">self-ticks from the device clock</text>
  <text x="702" y="273" class="bs">(1s / 60s, section 7.2)</text>
  <text x="702" y="289" class="bs">via Intl.DateTimeFormat (§12)</text>

  <path d="M282 255 H355" class="edge" marker-end="url(#arrow)"/>
  <text x="318" y="249" text-anchor="middle" class="ts">add</text>
  <path d="M638 255 H688" class="edge" marker-end="url(#arrow)"/>
  <text x="663" y="249" text-anchor="middle" class="ts">mount</text>

  <!-- leaf self-tick loop (bottom) -->
  <path d="M754 294 C754 322 824 322 824 294" class="edge" marker-end="url(#arrow)"/>
  <text x="789" y="338" text-anchor="middle" class="ts">render tick (on-device)</text>

  <!-- broker never reached -->
  <rect x="355" y="332" width="283" height="44" rx="8" class="bg-dash"/>
  <text x="369" y="352" class="bs-faded">Edge broker / proxy: NEVER REACHED</text>
  <text x="369" y="368" class="bs-faded">for a none widget (no call)</text>
  <path d="M450 294 V332" class="edge-dash" marker-end="url(#arrow)"/>
  <text x="458" y="316" class="ts">no call</text>

  <!-- footnote -->
  <text x="32" y="406" class="note">No BACKEND_REGISTRY entry, no OPERATION_REGISTRY entry, no proxy cache, no env secret.</text>
  <text x="32" y="422" class="note">The client ServiceDefinition is the entire registration (section 3.2, section 8).</text>
</svg>
