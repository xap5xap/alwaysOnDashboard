<svg width="100%" viewBox="0 0 760 540" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>alwaysOnDashboard test pyramid</title>
  <desc>A four-band test pyramid. The wide base is pure-function unit tests, run with jest for the app and deno test for the Edge Functions over a shared Zod module; they have no input or output and run on every push, fast. Above it a thin component and render band uses jest with React Native Testing Library for widget lifecycle states; it is named now and seeded later. The middle integration band runs against a real local supabase start stack with real Postgres, Edge runtime, and Vault, faking only outbound provider HTTP, and covers row-level security, the four broker flows, and the RevenueCat webhook; it runs as a gated pull-request job in CI. The narrow apex is end to end testing with Maestro, deferred to the first vertical slice in PS-M3. The wide base means many fast isolated tests; the narrow top means few slow high-fidelity tests; what must be faked grows upward.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .cap{font-size:12px;font-weight:600;fill:#1a1a1a;}
    .ts{font-size:12px;fill:#5b5b5b;}
    .bt{font-size:15px;font-weight:600;fill:#1a1a1a;}
    .bts{font-size:12px;fill:#3a3a3a;}
    .foot{font-size:12px;fill:#5b5b5b;}
    .lead{fill:none;stroke:#9a9a9a;stroke-width:1.2;}
    .axis{fill:none;stroke:#9a9a9a;stroke-width:1.3;}
    .bg-blue{fill:#dce8fb;stroke:#6e97d6;stroke-width:1;}
    .bg-green{fill:#dcf3e3;stroke:#5aa97a;stroke-width:1;}
    .bg-amber{fill:#fbecc9;stroke:#cda12f;stroke-width:1;}
    .bg-gray{fill:#ededed;stroke:#b4b4b4;stroke-width:1;}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="759" height="539" rx="10" fill="#ffffff" stroke="#e6e6e6"/>
  <text x="40" y="34" class="cap">alwaysOnDashboard test pyramid (Vela): unit, integration, e2e, split by runtime</text>

  <!-- Pyramid bands. Apex (290,72); base from (90,472) to (490,472). -->
  <!-- E2E apex -->
  <polygon class="bg-amber" points="290,72 245,162 335,162"/>
  <!-- Integration -->
  <polygon class="bg-blue" points="245,162 335,162 370,232 210,232"/>
  <!-- Component / render -->
  <polygon class="bg-gray" points="210,232 370,232 400,292 180,292"/>
  <!-- Unit base -->
  <polygon class="bg-green" points="180,292 400,292 490,472 90,472"/>

  <!-- In-band labels -->
  <text x="290" y="151" text-anchor="middle" class="bts" font-weight="600">E2E</text>
  <text x="290" y="201" text-anchor="middle" class="bt">Integration</text>
  <text x="290" y="266" text-anchor="middle" class="bt">Component</text>
  <text x="290" y="372" text-anchor="middle" class="bt">Unit</text>
  <text x="290" y="392" text-anchor="middle" class="bts">pure functions, the wide base</text>

  <!-- Leaders to right-side callouts -->
  <path d="M330 150 H506" class="lead"/>
  <path d="M353 197 H506" class="lead"/>
  <path d="M386 262 H506" class="lead"/>
  <path d="M446 400 H506" class="lead"/>

  <!-- Callouts -->
  <text x="512" y="140" class="cap">E2E · Maestro</text>
  <text x="512" y="156" class="ts">deferred to PS-M3 (first vertical slice)</text>

  <text x="512" y="183" class="cap">Integration · local `supabase start`</text>
  <text x="512" y="199" class="ts">real Postgres + Edge + Vault; provider HTTP faked</text>
  <text x="512" y="215" class="ts">RLS · 4 broker flows · webhook — CI: gated PR job</text>

  <text x="512" y="256" class="cap">Component · jest + RNTL</text>
  <text x="512" y="272" class="ts">widget lifecycle states; named, seeded later</text>

  <text x="512" y="386" class="cap">Unit · jest (app) + deno test (Edge)</text>
  <text x="512" y="402" class="ts">shared Zod; scheduler / tier / ambient math</text>
  <text x="512" y="418" class="ts">CI: every push, fast (no Docker)</text>

  <!-- Vertical axis: fidelity/cost up, count/speed down -->
  <path d="M62 462 V90" class="axis" marker-end="url(#arrow)"/>
  <text x="56" y="96" class="ts">fewer, slower,</text>
  <text x="56" y="111" class="ts">higher fidelity</text>
  <text x="56" y="452" class="ts">more, faster,</text>
  <text x="56" y="467" class="ts">isolated</text>

  <!-- Footer note -->
  <text x="40" y="508" class="foot">Wide base = many fast isolated tests; narrow top = few slow high-fidelity tests. The line: a test is integration only if it needs the real local stack; what must be faked grows upward.</text>
</svg>
