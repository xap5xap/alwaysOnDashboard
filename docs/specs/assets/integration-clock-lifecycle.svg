<svg width="100%" viewBox="0 0 760 332" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Clock lifecycle: the degenerate case (reuses widget-model section 7)</title>
  <desc>The Clock widget is added with no connection, no credential, and no fetch; every config field has a default, so the instance is ready at once and goes straight to Fresh with no Loading-from-network state. Fresh is the only live state: the card is always Fresh from the device clock, redrawn by an in-widget tick every second when seconds are shown, else every minute. The tick is a render cadence, not a fetch, because defaultRefresh is manual and there is no provider TTL and nothing cached. Every edge the credentialed widgets have is N/A for a none widget: no Loading-from-network because there is nothing to fetch, no Stale because a manual widget has staleAfterSeconds of Infinity, no Error because there is no provider call and so no 429 or 5xx, no Disconnected because there is no credential or connection, and no NeedsConfig because there is no remote-options field.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .cap{font-size:13px;font-weight:600;fill:#1a1a1a;}
    .ts{font-size:11px;fill:#5b5b5b;}
    .st{font-size:13px;font-weight:600;fill:#1a1a1a;}
    .sts{font-size:10.5px;fill:#5b5b5b;}
    .edge{fill:none;stroke:#7a7a7a;stroke-width:1.5;}
    .note{font-size:10.5px;fill:#6a6a6a;}
    .noteh{font-size:10.5px;font-weight:600;fill:#5a5a5a;}
    .notebox{fill:#fafafa;stroke:#dadada;stroke-width:0.8;stroke-dasharray:4 4;}
    .bg-green{fill:#dcf3e3;stroke:#5aa97a;stroke-width:1.4;}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="759" height="331" rx="10" fill="#ffffff" stroke="#e6e6e6"/>
  <text x="36" y="30" class="cap">Clock: the degenerate lifecycle (reuses widget-model §7)</text>

  <!-- start dot -->
  <circle cx="150" cy="62" r="6" fill="#1a1a1a"/>
  <path d="M150 68 V98" class="edge" marker-end="url(#arrow)"/>
  <text x="162" y="86" class="ts">add widget (no connect, no fetch, defaults ready)</text>

  <!-- the single state -->
  <rect x="80" y="98" width="190" height="64" rx="8" class="bg-green"/>
  <text x="175" y="126" text-anchor="middle" class="st">Fresh</text>
  <text x="175" y="146" text-anchor="middle" class="sts">always, from the device clock</text>

  <!-- self-tick loop (right) -->
  <path d="M270 116 C315 116 315 146 270 146" class="edge" marker-end="url(#arrow)"/>
  <text x="324" y="124" class="ts">in-widget tick:</text>
  <text x="324" y="139" class="ts">1s if seconds,</text>
  <text x="324" y="154" class="ts">else 60s (device clock)</text>

  <!-- note: the only live state -->
  <rect x="40" y="196" width="330" height="100" rx="8" class="notebox"/>
  <text x="54" y="217" class="noteh">The ONLY live state.</text>
  <text x="54" y="234" class="note">The card is always Fresh from the device clock.</text>
  <text x="54" y="250" class="note">The tick is a RENDER cadence, not a fetch:</text>
  <text x="54" y="266" class="note">defaultRefresh 'manual', no provider TTL,</text>
  <text x="54" y="282" class="note">nothing cached (section 7).</text>

  <!-- note: N/A states -->
  <rect x="390" y="196" width="330" height="116" rx="8" class="notebox"/>
  <text x="404" y="217" class="noteh">N/A (every credentialed edge removed):</text>
  <text x="404" y="234" class="note">· no Loading-from-network (nothing to fetch)</text>
  <text x="404" y="250" class="note">· no Stale (manual: staleAfterSeconds = Inf)</text>
  <text x="404" y="266" class="note">· no Error (no provider call: no 429 / 5xx)</text>
  <text x="404" y="282" class="note">· no Disconnected (no credential, no connection)</text>
  <text x="404" y="298" class="note">· no NeedsConfig (no remote-options field)</text>
</svg>
