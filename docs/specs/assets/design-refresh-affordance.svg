<svg width="100%" viewBox="0 0 860 472" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>The on-demand refresh affordance: placement and states (AOD-15)</title>
  <desc>Four widget cards showing the host-drawn refresh control in each of its states, plus a rules panel. Idle is a muted circular-arrow glyph in the header-right cluster that invites a tap. In-flight is the same glyph in accent colour while a manual fetch runs. Within-floor is the glyph dimmed with an up-to-date check because a tap inside the entitlement fetch-floor is served the cached value and makes no provider call. The Clock card shows no control at all because a never-fetching widget hides it. The rules panel states that the control sits in the header-right cluster after the status dot, fires the same manual-refresh path as pull-to-refresh, is uniform generic host chrome for every fetching widget, is gated by the AOD-12 fetch-floor and the AOD-5 cache ceiling, is a foreground affordance because kiosk auto-refreshes, and is hidden for no-fetch widgets like Clock.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .h{font-size:15px;font-weight:700;fill:#F4F4F8;}
    .sub{font-size:11.5px;fill:#9B9BA8;}
    .cap{font-size:10.5px;font-weight:600;fill:#9B9BA8;letter-spacing:0.8px;}
    .when{font-size:12px;font-weight:700;fill:#6E8BFF;}
    .title{font-size:16px;font-weight:600;fill:#F4F4F8;}
    .hero{font-size:34px;font-weight:700;fill:#F4F4F8;}
    .meta{font-size:11px;fill:#9B9BA8;}
    .stname{font-size:12px;font-weight:700;fill:#F4F4F8;}
    .stnote{font-size:10.5px;fill:#8A8A97;}
    .ph{font-size:12.5px;font-weight:700;fill:#F4F4F8;}
    .pb{font-size:11.5px;fill:#C9C9D4;}
  </style>
  <rect x="0.5" y="0.5" width="859" height="471" rx="12" fill="#0B0B0F" stroke="#1E1E26"/>
  <text x="32" y="40" class="h">On-demand refresh affordance: host chrome (AOD-15)</text>
  <text x="32" y="60" class="sub">One generic control rides the existing manual-refresh path. The renderer never sees it.</text>

  <!-- idle -->
  <rect x="32" y="92" width="236" height="120" rx="14" fill="#16161D" stroke="#2A2A36"/>
  <text x="50" y="120" class="cap">CALENDAR · NEXT EVENT</text>
  <g transform="translate(238,116)" stroke="#9B9BA8" stroke-width="1.7" fill="none" stroke-linecap="round">
    <path d="M-7 -1 A7 7 0 1 1 -5 5"/><path d="M-7 -6 L-7 -1 L-2 -1"/>
  </g>
  <text x="50" y="158" class="when">in 25 min · 3:30 PM</text>
  <text x="50" y="184" class="title">Design review</text>
  <text x="32" y="232" class="stname">idle <tspan class="stnote">· muted, invites a tap</tspan></text>

  <!-- in-flight -->
  <rect x="312" y="92" width="236" height="120" rx="14" fill="#16161D" stroke="#2A2A36"/>
  <text x="330" y="120" class="cap">CALENDAR · NEXT EVENT</text>
  <g transform="translate(518,116)" stroke="#6E8BFF" stroke-width="1.9" fill="none" stroke-linecap="round">
    <path d="M-7 -2 A7 7 0 1 1 -6 4.5"/><path d="M-7 -7 L-7 -2 L-2 -2"/>
  </g>
  <text x="330" y="158" class="when">in 25 min · 3:30 PM</text>
  <text x="330" y="184" class="title">Design review</text>
  <text x="312" y="232" class="stname">in-flight <tspan class="stnote">· accent, fetch running</tspan></text>

  <!-- within-floor -->
  <rect x="32" y="268" width="236" height="120" rx="14" fill="#16161D" stroke="#2A2A36"/>
  <text x="50" y="296" class="cap">CALENDAR · NEXT EVENT</text>
  <g transform="translate(232,292)" stroke="#5B5B68" stroke-width="1.6" fill="none" stroke-linecap="round">
    <path d="M-7 -1 A7 7 0 1 1 -5 5"/><path d="M-7 -6 L-7 -1 L-2 -1"/>
  </g>
  <path d="M242 289 l3 3 l5 -6" stroke="#4CB782" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="50" y="334" class="when">in 25 min · 3:30 PM</text>
  <text x="50" y="360" class="title">Design review</text>
  <text x="32" y="408" class="stname">within fetch-floor <tspan class="stnote">· served cached</tspan></text>

  <!-- clock hidden -->
  <rect x="312" y="268" width="236" height="120" rx="14" fill="#16161D" stroke="#2A2A36"/>
  <text x="330" y="296" class="cap">CLOCK</text>
  <g transform="translate(518,292)" stroke="#3A3A46" stroke-width="1.3" fill="none">
    <circle cx="0" cy="0" r="7" stroke-dasharray="2.5 2.5"/><line x1="-5" y1="5" x2="5" y2="-5" stroke-linecap="round"/>
  </g>
  <text x="330" y="346" class="hero">14:05</text>
  <text x="312" y="408" class="stname">Clock: hidden <tspan class="stnote">· never fetches, nothing to refresh</tspan></text>

  <!-- rules panel -->
  <rect x="592" y="92" width="236" height="296" rx="14" fill="#121219" stroke="#2A2A36"/>
  <text x="612" y="120" class="ph">Placement &amp; rules</text>
  <text x="612" y="150" class="pb">Header-right cluster, after the</text>
  <text x="612" y="166" class="pb">status dot.</text>
  <text x="612" y="192" class="pb">Same trigger as pull-to-refresh</text>
  <text x="612" y="208" class="pb">(widget-model §6.6). No new path.</text>
  <text x="612" y="234" class="pb">Uniform for every fetching widget,</text>
  <text x="612" y="250" class="pb">like the staleness badge.</text>
  <text x="612" y="276" class="pb">Gated by the AOD-12 §6.4 fetch-</text>
  <text x="612" y="292" class="pb">floor; never breaches the AOD-5</text>
  <text x="612" y="308" class="pb">≤900s cache ceiling.</text>
  <text x="612" y="334" class="pb">Foreground affordance: kiosk</text>
  <text x="612" y="350" class="pb">already auto-refreshes.</text>
  <text x="612" y="376" class="pb">Hidden for no-fetch widgets (Clock).</text>

  <!-- footer -->
  <line x1="32" y1="430" x2="828" y2="430" stroke="#22222C"/>
  <text x="32" y="456" class="sub">Generic per the host, not per widget: a service with no server half (authClass 'none', e.g. Clock) hides the control; all others show it.</text>
</svg>
