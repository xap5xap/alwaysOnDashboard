<svg width="100%" viewBox="0 0 860 582" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Vela credential-entry sheet: the key and location interiors inside the AOD-21 sheet</title>
  <desc>Two device frames, each showing the Connections list dimmed under a scrim with a bottom sheet rising at the overlay elevation with a grabber. Left: the key variant for admin_key and api_key, titled Connect Claude usage, with an API KEY label, a masked secret field with a Paste your key placeholder, and Cancel and Save actions, plus a note that an admin key is never logged or returned and shows a masked hint after connect. Right: the location variant for platform_key, titled Connect Weather, with a LOCATION label, a search row pairing a city field with a Search button, a results list of two geocoded cities each tappable, and a Cancel action, plus a note that picking a result submits coordinates and the searching and no-matches sub-states. A footer states the presentation is the AOD-21 sheet chrome and this design fixes only the interior.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .h{font-size:16px;font-weight:700;fill:#F4F4F8;}
    .sub{font-size:11.5px;fill:#9B9BA8;}
    .cap{font-size:9px;font-weight:700;fill:#9B9BA8;letter-spacing:1px;}
    .title{font-size:13.5px;font-weight:600;fill:#F4F4F8;}
    .titlem{font-size:13.5px;font-weight:600;fill:#9B9BA8;}
    .sheet{font-size:15px;font-weight:700;fill:#F4F4F8;}
    .meta{font-size:10.5px;fill:#9B9BA8;}
    .acc{fill:#6E8BFF;font-weight:700;}
    .on{fill:#FFFFFF;font-weight:700;}
    .tok{font-size:9px;fill:#8A8A97;font-family:ui-monospace,Menlo,monospace;}
    .note{font-size:11px;fill:#C9C9D4;}
    .cal{font-size:8.5px;fill:#8A8A97;font-family:ui-monospace,Menlo,monospace;}
    .faint{fill:#5A5A66;}
  </style>
  <rect x="0.5" y="0.5" width="859" height="565" rx="12" fill="#0B0B0F" stroke="#1E1E26"/>
  <text x="32" y="40" class="h">Credential-entry sheet · the interior</text>
  <text x="32" y="60" class="sub">A live ServiceDefinition + authClass. Presentation = the AOD-21 §7 sheet; this design fixes the body, by mechanism.</text>

  <!-- ===== LEFT: KEY ===== -->
  <text x="32" y="92" class="cap">API-KEY ENTRY · admin_key / api_key</text>
  <rect x="32" y="104" width="372" height="452" rx="28" fill="#0B0B0F" stroke="#2A2A36"/>
  <!-- dimmed connections behind -->
  <text x="52" y="148" class="cap faint">CONNECTIONS</text>
  <text x="52" y="174" class="title faint">Linear</text><text x="356" y="174" text-anchor="end" class="faint" font-size="11">Disconnect</text>
  <text x="52" y="202" class="title faint">Claude usage</text><text x="356" y="202" text-anchor="end" class="faint" font-size="11">Add key</text>
  <!-- scrim -->
  <rect x="34" y="124" width="368" height="178" fill="#000000" fill-opacity="0.5"/>
  <!-- sheet -->
  <rect x="32" y="300" width="372" height="256" rx="24" fill="#1F1F29" stroke="#2A2A36"/>
  <rect x="200" y="312" width="36" height="4" rx="2" fill="#6B6B78"/>
  <text x="56" y="345" class="sheet">Connect Claude usage</text>
  <path d="M372,336 l11,11 M383,336 l-11,11" stroke="#9B9BA8" stroke-width="1.6" stroke-linecap="round"/>
  <text x="56" y="376" class="cap">API KEY</text>
  <rect x="56" y="386" width="324" height="44" rx="8" fill="#16161D" stroke="#2A2A36"/>
  <text x="72" y="413" class="meta" font-size="13">Paste your key</text>
  <text x="366" y="413" text-anchor="end" class="cal">secure</text>
  <text x="56" y="470" class="titlem" font-size="13">Cancel</text>
  <rect x="296" y="452" width="84" height="38" rx="10" fill="#6E8BFF"/><text x="338" y="476" text-anchor="middle" class="on" font-size="13">Save</text>
  <text x="56" y="516" class="cal">admin_key: never logged or returned; masked hint after (AOD-9 §4)</text>
  <text x="56" y="532" class="cal">the key field serves api_key + admin_key (the 'key' mechanism)</text>

  <!-- ===== RIGHT: LOCATION ===== -->
  <text x="458" y="92" class="cap">LOCATION ENTRY · platform_key (Weather)</text>
  <rect x="458" y="104" width="370" height="452" rx="28" fill="#0B0B0F" stroke="#2A2A36"/>
  <!-- dimmed behind -->
  <text x="478" y="148" class="cap faint">CONNECTIONS</text>
  <text x="478" y="174" class="title faint">Weather</text><text x="804" y="174" text-anchor="end" class="faint" font-size="11">Set location</text>
  <text x="478" y="202" class="title faint">Clock</text><text x="804" y="202" text-anchor="end" class="faint" font-size="11">Built in</text>
  <!-- scrim -->
  <rect x="460" y="124" width="366" height="178" fill="#000000" fill-opacity="0.5"/>
  <!-- sheet -->
  <rect x="458" y="300" width="370" height="256" rx="24" fill="#1F1F29" stroke="#2A2A36"/>
  <rect x="625" y="312" width="36" height="4" rx="2" fill="#6B6B78"/>
  <text x="482" y="345" class="sheet">Connect Weather</text>
  <path d="M796,336 l11,11 M807,336 l-11,11" stroke="#9B9BA8" stroke-width="1.6" stroke-linecap="round"/>
  <text x="482" y="372" class="cap">LOCATION</text>
  <!-- search row: field + Search -->
  <rect x="482" y="380" width="234" height="42" rx="8" fill="#16161D" stroke="#2A2A36"/>
  <text x="498" y="406" class="title" font-size="13">Quito</text>
  <rect x="726" y="380" width="80" height="42" rx="10" fill="#6E8BFF"/><text x="766" y="406" text-anchor="middle" class="on" font-size="13">Search</text>
  <text x="482" y="440" class="cal">pick a result → submits {lat, lon} · searching · no matches</text>
  <!-- results -->
  <rect x="482" y="448" width="324" height="66" rx="10" fill="#16161D" stroke="#2A2A36"/>
  <text x="498" y="472" class="title">Quito, Pichincha, Ecuador</text>
  <line x1="498" y1="482" x2="790" y2="482" stroke="#2A2A36"/>
  <text x="498" y="503" class="title">Quito, Esmeraldas, Ecuador</text>
  <text x="482" y="538" class="titlem" font-size="13">Cancel</text>
  <text x="806" y="538" text-anchor="end" class="cal">no key stored · location is config (AOD-9 §7.2)</text>

  <line x1="32" y1="566" x2="828" y2="566" stroke="#22222C"/>
  <text x="32" y="579" class="note" font-size="10.5"><tspan fill="#6E8BFF" font-weight="700">Presentation = AOD-21 §7 sheet</tspan> (scrim + elevation.overlay + grabber). The shipped inline form is canonicalized to this sheet (§10).</text>
</svg>
