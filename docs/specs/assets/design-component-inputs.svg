<svg width="100%" viewBox="0 0 860 560" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Vela inputs: text field states, the search-row variant, and the input border resolution</title>
  <desc>Top: four text fields showing their states. Default is a surfaceAlt fill with a border hairline, a caption label above, and muted placeholder text. Focus swaps the border to a two pixel focusRing in the accent. Error swaps the border to the error color and shows an error line below. Disabled drops to forty percent opacity. Middle: the search-row variant, a field flexed beside a Search button, then a results list grouped on a raised surface, the pattern the connection credential form uses. Bottom: the resolution of the input border question. The semantic border role is not split; instead component-scoped aliases name input.border equals border, input.borderFocus equals focusRing, input.borderError equals error, and the row-group divider equals border, so no new semantic token forks.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .h{font-size:16px;font-weight:700;fill:#F4F4F8;}
    .sub{font-size:11.5px;fill:#9B9BA8;}
    .sec{font-size:11px;font-weight:700;fill:#C9C9D4;letter-spacing:1px;}
    .ilab{font-size:9px;font-weight:700;fill:#9B9BA8;letter-spacing:1px;}
    .val{font-size:13px;fill:#F4F4F8;}
    .ph{font-size:13px;fill:#9B9BA8;}
    .hint{font-size:10px;fill:#9B9BA8;}
    .errt{font-size:10px;fill:#FF6B6B;}
    .stt{font-size:9px;font-weight:700;fill:#8A8A97;font-family:ui-monospace,Menlo,monospace;}
    .on{fill:#FFFFFF;font-weight:700;}
    .acc{fill:#6E8BFF;}
    .tok{font-size:9px;fill:#8A8A97;font-family:ui-monospace,Menlo,monospace;}
    .note{font-size:11px;fill:#C9C9D4;}
    .rk{font-size:10.5px;font-weight:700;fill:#F4F4F8;}
    .rkr{font-size:8.5px;fill:#8A8A97;font-family:ui-monospace,Menlo,monospace;}
  </style>
  <rect x="0.5" y="0.5" width="859" height="559" rx="12" fill="#0B0B0F" stroke="#1E1E26"/>
  <text x="32" y="40" class="h">Inputs · text field, states, search row</text>
  <text x="32" y="60" class="sub">Placeholder → textMuted (was hardcoded hex). One field fill: surfaceAlt; focus and error recolor the border only.</text>

  <!-- ===== TEXT FIELD STATES ===== -->
  <text x="32" y="92" class="sec">TEXT FIELD · default · focus · error · disabled</text>

  <!-- default -->
  <text x="32" y="116" class="ilab">API KEY</text>
  <rect x="32" y="124" width="372" height="44" rx="8" fill="#1F1F29" stroke="#2A2A36"/>
  <text x="48" y="151" class="ph">Paste your key</text>
  <text x="32" y="184" class="hint">Stored encrypted server-side.</text>
  <text x="372" y="116" text-anchor="end" class="stt">surfaceAlt · border</text>

  <!-- focus -->
  <text x="456" y="116" class="ilab">API KEY</text>
  <rect x="452" y="120" width="380" height="52" rx="10" fill="none" stroke="#6E8BFF" stroke-opacity="0.3" stroke-width="2"/>
  <rect x="456" y="124" width="372" height="44" rx="8" fill="#1F1F29" stroke="#6E8BFF" stroke-width="1.5"/>
  <text x="472" y="151" class="val">sk-ant-admin-•••<tspan fill="#6E8BFF">|</tspan></text>
  <text x="456" y="184" class="hint">focused</text>
  <text x="828" y="116" text-anchor="end" class="stt">border → focusRing</text>

  <!-- error -->
  <text x="32" y="228" class="ilab">API KEY</text>
  <rect x="32" y="236" width="372" height="44" rx="8" fill="#1F1F29" stroke="#FF6B6B" stroke-width="1.5"/>
  <text x="48" y="263" class="val">sk-ant-bad</text>
  <text x="32" y="296" class="errt">That key was rejected. Check and retry.</text>
  <text x="372" y="228" text-anchor="end" class="stt">border → error</text>

  <!-- disabled -->
  <g opacity="0.4">
    <text x="456" y="228" class="ilab">API KEY</text>
    <rect x="456" y="236" width="372" height="44" rx="8" fill="#16161D" stroke="#2A2A36"/>
    <text x="472" y="263" class="ph">Connected</text>
  </g>
  <text x="828" y="228" text-anchor="end" class="stt">opacity 0.4</text>

  <line x1="32" y1="318" x2="828" y2="318" stroke="#22222C"/>

  <!-- ===== SEARCH ROW ===== -->
  <text x="32" y="344" class="sec">SEARCH ROW + RESULTS · the credential location pattern</text>
  <text x="32" y="368" class="ilab">LOCATION</text>
  <rect x="32" y="376" width="300" height="44" rx="8" fill="#1F1F29" stroke="#2A2A36"/>
  <text x="48" y="403" class="val">Quito</text>
  <rect x="344" y="376" width="92" height="44" rx="14" fill="#6E8BFF"/><text x="390" y="403" text-anchor="middle" class="val on" font-size="12">Search</text>
  <!-- results list on a raised surface -->
  <rect x="32" y="432" width="404" height="96" rx="10" fill="#1F1F29" stroke="#2A2A36"/>
  <text x="48" y="456" class="val">Quito, Pichincha, Ecuador</text>
  <line x1="48" y1="466" x2="420" y2="466" stroke="#2A2A36"/>
  <text x="48" y="488" class="val">Quito, Carchi, Ecuador</text>
  <line x1="48" y1="498" x2="420" y2="498" stroke="#2A2A36"/>
  <text x="48" y="520" class="val">Quitovac, Sonora, Mexico</text>
  <text x="436" y="368" text-anchor="end" class="stt">field flex + button · radius.sm</text>

  <!-- ===== BORDER RESOLUTION ===== -->
  <text x="468" y="344" class="sec">RESOLVED · the input border question</text>
  <rect x="468" y="356" width="360" height="172" rx="10" fill="#16161D" stroke="#2A2A36"/>
  <text x="484" y="380" class="note" fill="#6E8BFF" font-weight="700">No semantic split. Component-scoped aliases.</text>
  <text x="484" y="404" class="rk">input.border</text><text x="812" y="404" text-anchor="end" class="rkr">→ border</text>
  <line x1="484" y1="414" x2="812" y2="414" stroke="#22222C"/>
  <text x="484" y="434" class="rk">input.borderFocus</text><text x="812" y="434" text-anchor="end" class="rkr">→ focusRing</text>
  <line x1="484" y1="444" x2="812" y2="444" stroke="#22222C"/>
  <text x="484" y="464" class="rk">input.borderError</text><text x="812" y="464" text-anchor="end" class="rkr">→ error</text>
  <line x1="484" y1="474" x2="812" y2="474" stroke="#22222C"/>
  <text x="484" y="494" class="rk">rowGroup.divider</text><text x="812" y="494" text-anchor="end" class="rkr">→ border</text>
  <text x="484" y="518" class="tok">semantic `border` stays one role; no divider/inputBorder fork</text>
</svg>
