<svg width="100%" viewBox="0 0 860 540" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Vela overlays: bottom sheet, center modal, and popover menu</title>
  <desc>Three floating surfaces shown on mini dashboards. The bottom sheet darkens the dashboard with a fixed scrim of black at sixty percent and slides a surfaceAlt sheet up from the bottom edge with a grabber handle, the medium-large radius on its top corners, holding a configure form with cancel and save. The center modal uses the same scrim with a centered dialog at the overlay surface level, a confirm dialog with a ghost cancel and a destructive remove. The popover menu has no scrim because it is anchored to a known trigger, a surfaceAlt menu at the overlay level dropped below a Theme control, listing Dark selected with an accent check, Light, and System. A footer states the rule: scrim plus the overlay surface for modals and sheets that float over arbitrary content, and the overlay surface alone for a popover anchored to its trigger; the scrim is the fixed token, distinct from the dynamic night dim overlay.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .h{font-size:16px;font-weight:700;fill:#F4F4F8;}
    .sub{font-size:11.5px;fill:#9B9BA8;}
    .sec{font-size:11px;font-weight:700;fill:#C9C9D4;letter-spacing:1px;}
    .role{font-size:12px;font-weight:600;fill:#F4F4F8;}
    .cap{font-size:9px;font-weight:700;fill:#9B9BA8;letter-spacing:1px;}
    .meta{font-size:10.5px;fill:#9B9BA8;}
    .on{fill:#FFFFFF;font-weight:700;}
    .acc{fill:#6E8BFF;font-weight:700;}
    .mut{fill:#9B9BA8;font-weight:700;}
    .item{font-size:12px;fill:#F4F4F8;}
    .tok{font-size:9px;fill:#8A8A97;font-family:ui-monospace,Menlo,monospace;}
    .note{font-size:11px;fill:#C9C9D4;}
    .lab{font-size:10px;font-weight:700;fill:#F4F4F8;}
  </style>
  <rect x="0.5" y="0.5" width="859" height="539" rx="12" fill="#0B0B0F" stroke="#1E1E26"/>
  <text x="32" y="40" class="h">Overlays · sheets · modals · popovers</text>
  <text x="32" y="60" class="sub">Floating UI is scrim + elevation.overlay, never a shadow. The bottom sheet maps ConfigFormModal onto the scrim token.</text>

  <!-- ===== BOTTOM SHEET ===== -->
  <text x="32" y="92" class="sec">BOTTOM SHEET</text>
  <rect x="32" y="100" width="248" height="372" rx="16" fill="#0B0B0F" stroke="#2A2A36"/>
  <rect x="48" y="116" width="100" height="56" rx="8" fill="#16161D" stroke="#2A2A36"/>
  <rect x="160" y="116" width="104" height="56" rx="8" fill="#16161D" stroke="#2A2A36"/>
  <rect x="48" y="184" width="216" height="40" rx="8" fill="#16161D" stroke="#2A2A36"/>
  <rect x="32" y="100" width="248" height="372" rx="16" fill="#000000" opacity="0.6"/>
  <!-- sheet -->
  <rect x="32" y="286" width="248" height="186" rx="18" fill="#1F1F29" stroke="#2A2A36"/>
  <rect x="142" y="298" width="28" height="4" rx="2" fill="#3A3A46"/>
  <text x="48" y="328" class="role">Configure My Issues</text>
  <text x="48" y="350" class="cap">PROJECT</text>
  <rect x="48" y="358" width="216" height="40" rx="8" fill="#0B0B0F" stroke="#2A2A36"/>
  <text x="62" y="383" class="meta" font-size="12">Mobile</text>
  <rect x="48" y="414" width="100" height="36" rx="14" fill="none" stroke="#2A2A36"/><text x="98" y="437" text-anchor="middle" class="mut" font-size="12">Cancel</text>
  <rect x="164" y="414" width="100" height="36" rx="14" fill="#6E8BFF"/><text x="214" y="437" text-anchor="middle" class="on" font-size="12">Save</text>
  <text x="32" y="492" class="tok">scrim + sheet @ overlay · top radius.lg</text>

  <!-- ===== CENTER MODAL ===== -->
  <text x="304" y="92" class="sec">CENTER MODAL</text>
  <rect x="304" y="100" width="248" height="372" rx="16" fill="#0B0B0F" stroke="#2A2A36"/>
  <rect x="320" y="116" width="100" height="56" rx="8" fill="#16161D" stroke="#2A2A36"/>
  <rect x="432" y="116" width="104" height="56" rx="8" fill="#16161D" stroke="#2A2A36"/>
  <rect x="320" y="184" width="216" height="40" rx="8" fill="#16161D" stroke="#2A2A36"/>
  <rect x="320" y="240" width="216" height="40" rx="8" fill="#16161D" stroke="#2A2A36"/>
  <rect x="304" y="100" width="248" height="372" rx="16" fill="#000000" opacity="0.6"/>
  <!-- dialog -->
  <rect x="332" y="214" width="192" height="148" rx="18" fill="#1F1F29" stroke="#2A2A36"/>
  <text x="348" y="250" class="role">Disconnect Linear?</text>
  <text x="348" y="272" class="meta">Tokens are wiped</text>
  <text x="348" y="287" class="meta">immediately.</text>
  <rect x="348" y="306" width="76" height="36" rx="14" fill="none" stroke="#2A2A36"/><text x="386" y="329" text-anchor="middle" class="mut" font-size="12">Cancel</text>
  <rect x="432" y="306" width="76" height="36" rx="14" fill="#FF6B6B"/><text x="470" y="329" text-anchor="middle" class="on" font-size="12">Remove</text>
  <text x="304" y="492" class="tok">scrim + dialog @ overlay · radius.lg</text>

  <!-- ===== POPOVER / MENU ===== -->
  <text x="576" y="92" class="sec">POPOVER / MENU · no scrim</text>
  <rect x="576" y="100" width="252" height="372" rx="16" fill="#0B0B0F" stroke="#2A2A36"/>
  <text x="596" y="140" class="cap">APPEARANCE</text>
  <!-- trigger -->
  <rect x="596" y="152" width="212" height="40" rx="8" fill="#16161D" stroke="#2A2A36"/>
  <text x="612" y="177" class="item">Theme</text>
  <text x="792" y="177" text-anchor="end" class="acc" font-size="12">Dark ▾</text>
  <!-- popover -->
  <rect x="628" y="200" width="180" height="132" rx="12" fill="#1F1F29" stroke="#2A2A36"/>
  <text x="644" y="228" class="item">Dark</text><path d="M780 222 l4 4 l8 -9" fill="none" stroke="#6E8BFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="644" y1="242" x2="792" y2="242" stroke="#2A2A36"/>
  <text x="644" y="268" class="item">Light</text>
  <line x1="644" y1="282" x2="792" y2="282" stroke="#2A2A36"/>
  <text x="644" y="308" class="item">System</text>
  <text x="576" y="492" class="tok">menu @ overlay · anchored, no scrim</text>

  <line x1="32" y1="508" x2="828" y2="508" stroke="#22222C"/>
  <text x="32" y="530" class="note"><tspan fill="#6E8BFF" font-weight="700">Floats over arbitrary content → scrim.</tspan> Sheets and modals add the fixed scrim; an anchored popover does not. scrim ≠ the night dim.</text>
</svg>
