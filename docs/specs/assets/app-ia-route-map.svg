<svg width="100%" viewBox="0 0 1000 600" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Vela route map: who navigates where, and how</title>
  <desc>The in-app navigation graph. Dashboard is the hub. From Sign In the gate replaces into Onboarding (new user) or Dashboard (returning). Onboarding finishes by replacing into Dashboard. Dashboard pushes Settings, opens the add-widget picker and the per-instance config form as in-screen sheets, presents the dashboards switcher and the paywall as modal routes, replaces back to Sign In on sign out, and pushes the fullscreen kiosk wall (Pro), which is exited only by a gesture plus PIN. Settings holds Connections, Themes, and Account as pushed sections; Connections opens the credential form as a sheet for API-key and location entry. Any Pro-gated control routes to the paywall; it is drawn once from the Dashboard. The OAuth connect deep-link is shown in its own diagram.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .h{font-size:14px;font-weight:700;fill:#1a1a1a;}
    .leg{font-size:11px;fill:#5b5b5b;}
    .bt{font-size:13.5px;font-weight:600;fill:#1a1a1a;}
    .bs{font-size:11px;fill:#5b5b5b;}
    .el{font-size:11px;fill:#5b5b5b;}
    .note{font-size:12px;fill:#4a4a4a;}
    .e{fill:none;stroke:#7a7a7a;stroke-width:1.5;}
    .er{fill:none;stroke:#4a4a6a;stroke-width:1.6;}
    .em{fill:none;stroke:#9a7fc0;stroke-width:1.5;stroke-dasharray:6 4;}
    .es{fill:none;stroke:#4f9e74;stroke-width:1.5;stroke-dasharray:2 4;stroke-linecap:round;}
    .bg-blue{fill:#e6ecfb;stroke:#6E8BFF;stroke-width:1.4;}
    .bg-soft{fill:#f5f6fa;stroke:#d3d6e2;stroke-width:1;}
    .bg-modal{fill:#efeaf7;stroke:#9a7fc0;stroke-width:1;}
    .bg-sheet{fill:#ffffff;stroke:#4f9e74;stroke-width:1.1;stroke-dasharray:4 3;}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="999" height="599" rx="10" fill="#ffffff" stroke="#e6e6e6"/>
  <text x="32" y="32" class="h">Vela route map: who navigates where, and how</text>
  <!-- edge legend -->
  <line x1="34" y1="50" x2="66" y2="50" class="e" marker-end="url(#arrow)"/>
  <text x="72" y="54" class="leg">push</text>
  <line x1="120" y1="50" x2="152" y2="50" class="er" marker-end="url(#arrow)"/>
  <text x="158" y="54" class="leg">replace</text>
  <line x1="216" y1="50" x2="248" y2="50" class="em" marker-end="url(#arrow)"/>
  <text x="254" y="54" class="leg">modal route</text>
  <line x1="338" y1="50" x2="370" y2="50" class="es" marker-end="url(#arrow)"/>
  <text x="376" y="54" class="leg">in-screen sheet</text>
  <text x="480" y="54" class="leg">nodes:  blue = hub · lavender = modal route · dashed = sheet (not a route)</text>

  <!-- Sign In -->
  <rect x="60" y="150" width="150" height="54" rx="8" class="bg-soft"/>
  <text x="76" y="174" class="bt">Sign In</text>
  <text x="76" y="192" class="bs">(auth) · signed-out</text>

  <!-- Onboarding -->
  <rect x="60" y="270" width="150" height="54" rx="8" class="bg-soft"/>
  <text x="76" y="294" class="bt">Onboarding</text>
  <text x="76" y="312" class="bs">first run</text>

  <!-- Dashboard hub -->
  <rect x="400" y="160" width="220" height="72" rx="9" class="bg-blue"/>
  <text x="418" y="190" class="bt">Dashboard (home)</text>
  <text x="418" y="210" class="bs">the hub · arrange mode is in-screen state</text>

  <!-- Switcher modal -->
  <rect x="400" y="78" width="220" height="44" rx="8" class="bg-modal"/>
  <text x="418" y="105" class="bt">Dashboards switcher</text>

  <!-- Widget picker sheet -->
  <rect x="320" y="290" width="156" height="48" rx="8" class="bg-sheet"/>
  <text x="336" y="312" class="bt">Widget picker</text>
  <text x="336" y="328" class="bs">add-widget</text>

  <!-- Config sheet -->
  <rect x="500" y="290" width="170" height="48" rx="8" class="bg-sheet"/>
  <text x="516" y="312" class="bt">Config sheet</text>
  <text x="516" y="328" class="bs">per-instance</text>

  <!-- Settings -->
  <rect x="790" y="160" width="172" height="54" rx="8" class="bg-soft"/>
  <text x="806" y="184" class="bt">Settings</text>
  <text x="806" y="201" class="bs">home</text>
  <!-- sections -->
  <rect x="790" y="232" width="172" height="38" rx="7" class="bg-soft"/>
  <text x="806" y="256" class="bt">Connections</text>
  <rect x="790" y="280" width="172" height="34" rx="7" class="bg-soft"/>
  <text x="806" y="302" class="bs">Themes</text>
  <text x="936" y="302" class="el">push</text>
  <rect x="790" y="324" width="172" height="34" rx="7" class="bg-soft"/>
  <text x="806" y="346" class="bs">Account</text>
  <text x="936" y="346" class="el">push</text>

  <!-- Credential form sheet -->
  <rect x="596" y="372" width="180" height="44" rx="8" class="bg-sheet"/>
  <text x="612" y="394" class="bt">Credential form</text>
  <text x="612" y="409" class="bs">key / location</text>

  <!-- Kiosk -->
  <rect x="372" y="438" width="186" height="56" rx="8" class="bg-soft"/>
  <text x="388" y="462" class="bt">Kiosk wall</text>
  <text x="388" y="480" class="bs">fullscreen · chrome hidden</text>

  <!-- Paywall -->
  <rect x="96" y="438" width="186" height="56" rx="8" class="bg-modal"/>
  <text x="112" y="462" class="bt">Paywall</text>
  <text x="112" y="480" class="bs">upgrade · 7-day trial</text>

  <!-- edges -->
  <!-- 1 SignIn -> Onboarding -->
  <path d="M135 204 V270" class="er" marker-end="url(#arrow)"/>
  <text x="143" y="242" class="el">replace · sign-up</text>
  <!-- 2 Onboarding -> Dashboard -->
  <path d="M210 286 C320 270 356 214 400 202" class="er" marker-end="url(#arrow)"/>
  <text x="250" y="256" class="el">replace · finish</text>
  <!-- 3 SignIn -> Dashboard -->
  <path d="M210 170 C326 160 360 182 400 190" class="er" marker-end="url(#arrow)"/>
  <text x="244" y="150" class="el">replace · returning</text>
  <!-- 4 Dashboard -> Switcher -->
  <path d="M510 160 V122" class="em" marker-end="url(#arrow)"/>
  <text x="520" y="146" class="el">modal · switch / create</text>
  <!-- 5 Dashboard -> Widget picker -->
  <path d="M466 232 C440 262 420 274 410 290" class="es" marker-end="url(#arrow)"/>
  <text x="338" y="266" class="el">sheet · Add</text>
  <!-- 6 Dashboard -> Config sheet -->
  <path d="M566 232 C582 262 588 274 590 290" class="es" marker-end="url(#arrow)"/>
  <text x="598" y="266" class="el">sheet · configure</text>
  <!-- 7 Dashboard -> Settings -->
  <path d="M620 192 H790" class="e" marker-end="url(#arrow)"/>
  <text x="660" y="184" class="el">push · Settings</text>
  <!-- 8 Dashboard -> SignIn (sign out) -->
  <path d="M432 160 V134 H135 V150" class="er" marker-end="url(#arrow)"/>
  <text x="232" y="128" class="el">replace · sign out</text>
  <!-- 9 Dashboard -> Kiosk -->
  <path d="M452 232 V438" class="e" marker-end="url(#arrow)"/>
  <text x="300" y="392" class="el">push · enter kiosk (Pro)</text>
  <!-- 10 Kiosk -> Dashboard -->
  <path d="M498 438 V232" class="e" marker-end="url(#arrow)"/>
  <text x="506" y="360" class="el">exit · gesture + PIN</text>
  <!-- 11 Dashboard -> Paywall -->
  <path d="M400 214 C300 264 232 372 200 438" class="em" marker-end="url(#arrow)"/>
  <text x="206" y="332" class="el">modal · Pro gate (Free)</text>
  <!-- 13 Widget picker -> Config sheet -->
  <path d="M476 314 H500" class="es" marker-end="url(#arrow)"/>
  <!-- 14 Settings -> Connections -->
  <path d="M876 214 V232" class="e" marker-end="url(#arrow)"/>
  <text x="884" y="228" class="el">push</text>
  <!-- 15 Connections -> Credential form -->
  <path d="M790 256 C764 286 740 350 716 372" class="es" marker-end="url(#arrow)"/>
  <text x="690" y="330" class="el">sheet · key / location</text>

  <!-- notes -->
  <text x="32" y="536" class="note">Paywall is reached from any Pro-gated control (Kiosk / Themes rows, faster refresh, a 3rd service, a 2nd dashboard); drawn once here from Dashboard.</text>
  <text x="32" y="556" class="note">Widget picker, when nothing is addable, pushes Settings &#8594; Connections. OAuth connect uses a system-browser deep-link (see the OAuth diagram).</text>
  <text x="32" y="576" class="note">Replace edges leave no back entry. Kiosk suppresses the OS back as a casual exit (AOD-11 §4.3); only gesture + PIN exits.</text>
</svg>
