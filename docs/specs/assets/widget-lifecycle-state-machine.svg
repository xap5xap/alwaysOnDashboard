<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Widget render lifecycle state machine</title>
  <desc>Five states: loading, fresh, stale, error, disconnected. Mounting enters loading. Loading goes to fresh when data arrives. Fresh and stale interconvert as data ages and recovers. Fresh and stale go to error on a failed refresh, and error recovers to fresh. Any active state goes to disconnected on a 409 needs-reconnect, and disconnected returns to loading when the user reconnects. Color encodes whether the widget renderer runs: green is live data, amber is last-known data shown, gray is host chrome with no widget render.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .ts{font-size:12px;fill:#5b5b5b;}
    .th{font-size:14px;font-weight:600;fill:#1a1a1a;}
    .bt{font-size:14px;font-weight:600;fill:#1a1a1a;}
    .bs{font-size:12px;fill:#4a4a4a;}
    .edge{fill:none;stroke:#7a7a7a;stroke-width:1.5;}
    .container{fill:none;stroke:#c0c0c0;stroke-width:0.8;stroke-dasharray:4 4;}
    .bg-green{fill:#dcf3e3;stroke:#5aa97a;stroke-width:1;}
    .bg-amber{fill:#fbecc9;stroke:#cda12f;stroke-width:1;}
    .bg-gray{fill:#ededed;stroke:#b4b4b4;stroke-width:1;}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="679" height="419" rx="10" fill="#ffffff" stroke="#e6e6e6"/>

  <!-- legend -->
  <rect x="40" y="43" width="12" height="12" rx="3" class="bg-green"/>
  <text x="57" y="53" class="ts">live (fresh)</text>
  <rect x="150" y="43" width="12" height="12" rx="3" class="bg-amber"/>
  <text x="167" y="53" class="ts">last-known shown (stale / error)</text>
  <rect x="410" y="43" width="12" height="12" rx="3" class="bg-gray"/>
  <text x="427" y="53" class="ts">no widget render</text>

  <!-- dashed active-states container -->
  <rect x="55" y="100" width="400" height="300" rx="10" class="container"/>
  <text x="445" y="394" text-anchor="end" class="ts">service connected (active states)</text>

  <!-- start -->
  <circle cx="130" cy="84" r="5" fill="#7a7a7a"/>
  <path d="M130 89 V118" class="edge" marker-end="url(#arrow)"/>

  <!-- state nodes -->
  <rect x="80" y="118" width="150" height="50" rx="8" class="bg-gray"/>
  <text x="92" y="140" class="bt">Loading</text><text x="92" y="157" class="bs">host skeleton</text>
  <rect x="290" y="118" width="150" height="50" rx="8" class="bg-green"/>
  <text x="302" y="140" class="bt">Fresh</text><text x="302" y="157" class="bs">renderer: live data</text>
  <rect x="290" y="320" width="150" height="50" rx="8" class="bg-amber"/>
  <text x="302" y="342" class="bt">Stale</text><text x="302" y="359" class="bs">last-known + badge</text>
  <rect x="80" y="320" width="150" height="50" rx="8" class="bg-amber"/>
  <text x="92" y="342" class="bt">Error</text><text x="92" y="359" class="bs">last-known + retry</text>
  <rect x="500" y="214" width="140" height="52" rx="8" class="bg-gray"/>
  <text x="512" y="237" class="bt">Disconnected</text><text x="512" y="254" class="bs">reconnect prompt</text>

  <!-- transitions -->
  <path d="M230 143 H290" class="edge" marker-end="url(#arrow)"/>
  <text x="260" y="137" text-anchor="middle" class="ts">got data</text>
  <path d="M365 168 V320" class="edge" marker-end="url(#arrow)"/>
  <text x="373" y="240" class="ts">overdue</text>
  <path d="M353 320 V168" class="edge" marker-end="url(#arrow)"/>
  <text x="345" y="262" text-anchor="end" class="ts">recovers</text>
  <path d="M155 168 V320" class="edge" marker-end="url(#arrow)"/>
  <text x="163" y="246" class="ts">load fails</text>
  <path d="M168 320 V258 H255 V150 H290" class="edge" marker-end="url(#arrow)"/>
  <text x="210" y="252" text-anchor="middle" class="ts">retry ok</text>
  <path d="M290 345 H230" class="edge" marker-end="url(#arrow)"/>
  <text x="260" y="339" text-anchor="middle" class="ts">fails</text>
  <path d="M300 168 V288 H170 V320" class="edge" marker-end="url(#arrow)"/>
  <text x="236" y="283" text-anchor="middle" class="ts">refresh fails</text>

  <!-- self loops -->
  <path d="M345 118 C342 104 388 104 385 118" class="edge" marker-end="url(#arrow)"/>
  <text x="365" y="99" text-anchor="middle" class="ts">tick ok</text>
  <path d="M125 370 C122 384 168 384 165 370" class="edge" marker-end="url(#arrow)"/>
  <text x="145" y="396" text-anchor="middle" class="ts">backoff</text>

  <!-- 409 fan-in (consolidated) and reconnect -->
  <path d="M455 240 H500" class="edge" marker-end="url(#arrow)"/>
  <text x="478" y="208" text-anchor="middle" class="ts">409 / reauth</text>
  <path d="M570 214 V72 H155 V118" class="edge" marker-end="url(#arrow)"/>
  <text x="362" y="66" text-anchor="middle" class="ts">user reconnects</text>
</svg>
