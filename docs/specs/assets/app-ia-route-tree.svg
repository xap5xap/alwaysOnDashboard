  <!-- sheets panel -->
  <rect x="32" y="654" width="796" height="112" rx="8" class="panel"/>
  <text x="48" y="678" class="h">In-screen sheets  —  not routes</text>
  <text x="300" y="678" class="leg">RN &lt;Modal&gt; owned by a parent screen; carries a live object, so it is not a global route</text>
