<svg width="100%" viewBox="0 0 860 786" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Vela expo-router route tree (apps/app/app)</title>
  <desc>The expo-router file tree for the app. app/_layout.tsx is the root Stack and provider stack (exists today). app/index.tsx is the auth gate and evolves from an inline SignIn-or-Dashboard render into a Redirect keyed on the Supabase session and the onboarded flag. app/oauth/done.tsx is the new OAuth callback deep-link target at vela://oauth/done. The (auth) group is the signed-out zone with sign-in.tsx (the SignIn component exists and gains a route). The (app) group is the signed-in zone, session-guarded, holding index.tsx (the Dashboard home, moved here), onboarding.tsx, dashboards.tsx and paywall.tsx (both modal presentation), kiosk.tsx (fullscreen, chrome hidden), and the settings folder with index.tsx (today settings.tsx, Settings home plus Connections), themes.tsx, and account.tsx. Separately, the add-widget picker, the per-instance config sheet, and the credential form are in-screen React Native modals owned by a parent screen, not router routes, because they carry a live object from that screen.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .h{font-size:14px;font-weight:700;fill:#1a1a1a;}
    .leg{font-size:11px;fill:#5b5b5b;}
    .folder{font-size:13px;font-weight:700;fill:#1a1a1a;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
    .path{font-size:13px;fill:#1a1a1a;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
    .ann{font-size:12px;fill:#7a7a7a;}
    .desc{font-size:12px;fill:#5b5b5b;}
    .bExists{font-size:11px;font-weight:700;fill:#2c8a5b;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
    .bAdd{font-size:11px;font-weight:700;fill:#4a63c8;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
    .bMove{font-size:11px;font-weight:700;fill:#b07d1e;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
    .bSheet{font-size:11px;font-weight:700;fill:#8a6bb0;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
    .guide{stroke:#dadada;stroke-width:1;fill:none;}
    .panel{fill:#f7f8fb;stroke:#d3d6e2;stroke-width:1;}
  </style>

  <rect x="0.5" y="0.5" width="859" height="785" rx="10" fill="#ffffff" stroke="#e6e6e6"/>
  <text x="32" y="34" class="h">expo-router route tree  ·  apps/app/app/</text>
  <text x="32" y="54" class="leg">Legend:  <tspan class="bExists">EXISTS</tspan> shipped today    <tspan class="bMove">MOVE/EVOLVE</tspan> existing file re-roled    <tspan class="bAdd">ADD</tspan> new route    <tspan class="bSheet">SHEET</tspan> in-screen modal, not a route</text>

  <!-- guide lines -->
  <path d="M50 96 V622" class="guide"/>
  <path d="M84 188 V216" class="guide"/>
  <path d="M84 246 V332" class="guide"/>
  <path d="M84 362 V594" class="guide"/>
  <path d="M118 536 V622" class="guide"/>

