<svg width="100%" viewBox="0 0 880 540" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Vela navigation: the auth-gated zone model</title>
  <desc>App launch mounts the root layout (_layout.tsx), a Stack wrapping the provider stack (Auth, Registry, Entitlements, Ambient, WidgetDataSource). Control then reaches the gate (index.tsx), which reads the Supabase session from AuthProvider and routes to one of three zones. With no session the user lands in the (auth) zone at Sign In. After authenticating the gate re-runs: a first-run user goes to Onboarding, a returning onboarded user goes to the (app) zone at the Dashboard. Onboarding finishes into the Dashboard. The (app) zone holds every signed-in surface: Dashboard, Settings and its Connections, Themes, Account, Kiosk, Paywall, and the dashboards switcher.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .h{font-size:14px;font-weight:700;fill:#1a1a1a;}
    .cap{font-size:12px;font-weight:600;fill:#1a1a1a;}
    .zlab{font-size:12px;font-weight:700;fill:#5b5b5b;letter-spacing:0.4px;}
    .ts{font-size:12px;fill:#5b5b5b;}
    .bt{font-size:14px;font-weight:600;fill:#1a1a1a;}
    .bs{font-size:12px;fill:#4a4a4a;}
    .note{font-size:12px;fill:#4a4a4a;}
    .edge{fill:none;stroke:#7a7a7a;stroke-width:1.5;}
    .edged{fill:none;stroke:#8a8a8a;stroke-width:1.5;stroke-dasharray:5 4;}
    .container{fill:none;stroke:#c0c0c0;stroke-width:0.9;stroke-dasharray:4 4;}
    .bg-blue{fill:#e6ecfb;stroke:#6E8BFF;stroke-width:1;}
    .bg-gray{fill:#ededed;stroke:#b4b4b4;stroke-width:1;}
    .bg-amber{fill:#f9edcf;stroke:#d6a73a;stroke-width:1;}
    .bg-soft{fill:#f5f6fa;stroke:#d3d6e2;stroke-width:1;}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="879" height="539" rx="10" fill="#ffffff" stroke="#e6e6e6"/>
  <text x="32" y="34" class="h">Vela navigation: the auth-gated zone model</text>

  <!-- start -->
  <circle cx="440" cy="56" r="5" fill="#7a7a7a"/>
  <path d="M440 61 V70" class="edge" marker-end="url(#arrow)"/>

  <!-- root layout -->
  <rect x="296" y="70" width="288" height="50" rx="8" class="bg-soft"/>
  <text x="312" y="92" class="bt">_layout.tsx  ·  root Stack</text>
  <text x="312" y="110" class="bs">providers: Auth · Registry · Entitlements · Ambient · DataSource</text>
  <path d="M440 120 V146" class="edge" marker-end="url(#arrow)"/>

  <!-- gate -->
  <rect x="322" y="146" width="236" height="54" rx="8" class="bg-gray"/>
  <text x="338" y="170" class="bt">index.tsx  ·  auth gate</text>
  <text x="338" y="188" class="bs">reads Supabase session (AuthProvider)</text>

  <!-- gate -> 3 zones -->
  <path d="M360 200 V224 H165 V252" class="edge" marker-end="url(#arrow)"/>
  <text x="120" y="242" class="ts">no session</text>
  <path d="M440 200 V252" class="edge" marker-end="url(#arrow)"/>
  <text x="448" y="228" class="ts">session · first run</text>
  <path d="M520 200 V224 H715 V252" class="edge" marker-end="url(#arrow)"/>
  <text x="620" y="242" class="ts">session · onboarded</text>

  <!-- (auth) zone -->
  <rect x="40" y="252" width="250" height="176" rx="10" class="container"/>
  <text x="56" y="274" class="zlab">(auth)  ·  SIGNED-OUT</text>
  <rect x="72" y="300" width="186" height="66" rx="8" class="bg-gray"/>
  <text x="88" y="328" class="bt">Sign In</text>
  <text x="88" y="348" class="bs">email / password</text>

  <!-- onboarding zone -->
  <rect x="315" y="252" width="240" height="176" rx="10" class="container"/>
  <text x="331" y="274" class="zlab">FIRST RUN  ·  SIGNED-IN</text>
  <rect x="345" y="300" width="180" height="66" rx="8" class="bg-amber"/>
  <text x="361" y="328" class="bt">Onboarding</text>
  <text x="361" y="348" class="bs">connect · pick widgets</text>

  <!-- (app) zone -->
  <rect x="580" y="252" width="270" height="206" rx="10" class="container"/>
  <text x="596" y="274" class="zlab">(app)  ·  SIGNED-IN</text>
  <rect x="610" y="296" width="210" height="48" rx="8" class="bg-blue"/>
  <text x="626" y="325" class="bt">Dashboard (home)</text>
  <rect x="610" y="356" width="210" height="86" rx="8" class="bg-soft"/>
  <text x="626" y="378" class="bs">Settings · Connections</text>
  <text x="626" y="398" class="bs">Themes · Account</text>
  <text x="626" y="418" class="bs">Kiosk · Paywall</text>
  <text x="626" y="436" class="bs">Dashboards switcher</text>

  <!-- sign-in -> re-gate (dashed) -->
  <path d="M150 300 C150 250 250 232 322 206" class="edged" marker-end="url(#arrow)"/>
  <text x="158" y="262" class="ts">on auth, gate re-runs</text>

  <!-- onboarding -> app finish -->
  <path d="M525 322 H568 V320 H610" class="edge" marker-end="url(#arrow)"/>
  <text x="540" y="312" class="ts">finish</text>

  <!-- notes -->
  <text x="32" y="486" class="note">The gate is index.tsx: it reads the AuthProvider Supabase session and routes to (auth), Onboarding, or (app).</text>
  <text x="32" y="504" class="note">Today the gate renders &lt;SignIn/&gt; or &lt;Dashboard/&gt; inline (§9 reconciliation); this IA formalizes that split into the three zones.</text>
  <text x="32" y="522" class="note">Auth transitions replace the stack (no back into a stale auth state). The OAuth callback deep-link returns into (app); see the route map.</text>
</svg>
