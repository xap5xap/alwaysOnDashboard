<svg width="100%" viewBox="0 0 880 612" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Linear Current Cycle face: the progress bar is the value, the percent the readout, across medium and large</title>
  <desc>The Current Cycle card with its bespoke centerpiece, the progress treatment, enlarged and annotated, then applied across its two supported sizes plus the empty body. The enlarged card shows a cycle label, a large accent percent readout, and a horizontal progress bar whose solid accent fill is the completed fraction and whose faint accent track is the remaining fraction, one accent at two intensities, the same discipline the spend sparkline uses for today versus the earlier days. Below the bar a completed over total issue count reads with the completed number bright, and an ends-in days line gives the time remaining. Numbered markers key a legend on the right. The medium card is a compact landscape with the label and percent on one line, the bar, and the counts. The large card is a square with a big percent hero, a taller bar, the label, the counts, and the ends-in line. The empty card shows the renderer-drawn body when the team has no active cycle: a calm centred cycle-ring glyph, a muted No active cycle line, and a quiet subline, carrying no action. A token panel records the progress group and notes the chrome, states, refresh, dim, and empty-body convention are reused from the system unchanged.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .h{font-size:15px;font-weight:700;fill:#F4F4F8;}
    .sub{font-size:11.5px;fill:#9B9BA8;}
    .sec{font-size:11px;font-weight:700;fill:#9B9BA8;letter-spacing:1px;}
    .cap{font-size:10.5px;font-weight:600;fill:#9B9BA8;letter-spacing:0.8px;}
    .cyc{font-size:15px;font-weight:600;fill:#F4F4F8;}
    .cycSm{font-size:13px;font-weight:600;fill:#F4F4F8;}
    .pct{font-weight:700;fill:#6E8BFF;font-variant:tabular-nums;}
    .cDone{font-weight:700;fill:#F4F4F8;font-variant:tabular-nums;}
    .cRest{fill:#9B9BA8;font-variant:tabular-nums;}
    .meta{font-size:11px;fill:#8A8A97;font-variant:tabular-nums;}
    .empty{font-size:14px;font-weight:500;fill:#9B9BA8;}
    .emptysub{font-size:12px;fill:#8A8A97;}
    .anno{font-size:11.5px;fill:#C9C9D4;}
    .annob{font-size:11.5px;font-weight:700;fill:#F4F4F8;}
    .idx{font-size:10px;font-weight:700;fill:#0B0B0F;}
    .ph{font-size:12px;font-weight:700;fill:#F4F4F8;}
    .pb{font-size:11.5px;fill:#C9C9D4;}
    .pk{font-size:11.5px;font-weight:700;fill:#6E8BFF;}
    .lab{font-size:11px;font-weight:700;fill:#F4F4F8;}
    .labn{font-size:10.5px;fill:#8A8A97;}
    .div{stroke:#22222C;stroke-width:1;}
    .track{fill:#6E8BFF;fill-opacity:0.18;}
    .fill{fill:#6E8BFF;}
  </style>

  <defs>
    <g id="refresh" stroke="#9B9BA8" stroke-width="1.6" fill="none" stroke-linecap="round">
      <path d="M-7 -1 A7 7 0 1 1 -5 5" vector-effect="non-scaling-stroke"/>
      <path d="M-7 -6 L-7 -1 L-2 -1" vector-effect="non-scaling-stroke"/>
    </g>
    <!-- Current Cycle empty glyph: a cycle ring (reused from design-empty-body.svg) -->
    <g id="cycle-empty" fill="none">
      <path d="M16.58 3.66 A10 10 0 1 1 9.42 3.66" stroke="#6E8BFF" stroke-opacity="0.65" stroke-width="1.7" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
      <circle cx="13" cy="2.8" r="1.35" fill="#6E8BFF" fill-opacity="0.65"/>
    </g>
  </defs>

  <rect x="0.5" y="0.5" width="879" height="611" rx="12" fill="#0B0B0F" stroke="#1E1E26"/>
  <text x="32" y="38" class="h">Current Cycle: the progress bar is the value, the percent the readout</text>
  <text x="32" y="58" class="sub">Track + accent fill + accent percent (tabular). One accent at two intensities (solid fill vs faint track), the spend sparkline's discipline. supportedSizes: medium, large.</text>

  <!-- ===================== PROGRESS TREATMENT (enlarged) ===================== -->
  <text x="32" y="92" class="sec">THE PROGRESS TREATMENT (enlarged) · the bespoke centerpiece (parallel to the spend sparkline)</text>

  <rect x="32" y="104" width="520" height="208" rx="14" fill="#16161D" stroke="#2A2A36"/>
  <text x="52" y="132" class="cap">LINEAR · CURRENT CYCLE</text>
  <use href="#refresh" transform="translate(528 128)"/>
  <text x="52" y="172" class="cyc">Cycle 8: Polish sprint</text>
  <text x="500" y="178" text-anchor="end" class="pct" font-size="44">67%</text>
  <!-- bar -->
  <rect class="track" x="52" y="206" width="448" height="18" rx="9"/>
  <rect class="fill"  x="52" y="206" width="300" height="18" rx="9"/>
  <!-- counts + days -->
  <text x="52" y="256"><tspan class="cDone" font-size="14">16</tspan> <tspan class="cRest" font-size="14">/ 24 issues</tspan></text>
  <text x="500" y="256" text-anchor="end" class="meta" font-size="12">ends in 3 days</text>
  <line x1="52" y1="276" x2="500" y2="276" class="div"/>
  <text x="52" y="295" class="labn">Solid fill = completed; faint track = remaining. The progress is the card's one accent (no second colour).</text>

  <!-- on-card numbered markers -->
  <circle cx="200" cy="215" r="8" fill="#0B0B0F" stroke="#6E8BFF" stroke-width="1.5"/><text x="200" y="219" text-anchor="middle" class="idx" fill="#6E8BFF">1</text>
  <circle cx="430" cy="215" r="8" fill="#0B0B0F" stroke="#6E8BFF" stroke-width="1.5"/><text x="430" y="219" text-anchor="middle" class="idx" fill="#6E8BFF">2</text>
  <circle cx="468" cy="156" r="8" fill="#6E8BFF"/><text x="468" y="160" text-anchor="middle" class="idx">3</text>
  <circle cx="168" cy="251" r="8" fill="#6E8BFF"/><text x="168" y="255" text-anchor="middle" class="idx">4</text>

  <!-- keyed legend -->
  <circle cx="580" cy="130" r="9" fill="#6E8BFF"/><text x="580" y="134" text-anchor="middle" class="idx">1</text>
  <text x="598" y="127" class="annob">Accent fill</text>
  <text x="598" y="143" class="anno">the completed fraction, solid colors.accent.</text>

  <circle cx="580" cy="176" r="9" fill="#0B0B0F" stroke="#6E8BFF" stroke-width="1.5"/><text x="580" y="180" text-anchor="middle" class="idx" fill="#6E8BFF">2</text>
  <text x="598" y="173" class="annob">Track</text>
  <text x="598" y="189" class="anno">the remaining, colors.accent @ 0.18 (no new colour).</text>

  <circle cx="580" cy="222" r="9" fill="#6E8BFF"/><text x="580" y="226" text-anchor="middle" class="idx">3</text>
  <text x="598" y="219" class="annob">Percent</text>
  <text x="598" y="235" class="anno">Linear's own progress (0..1), colors.accent, tabular.</text>

  <circle cx="580" cy="268" r="9" fill="#6E8BFF"/><text x="580" y="272" text-anchor="middle" class="idx">4</text>
  <text x="598" y="265" class="annob">Counts</text>
  <text x="598" y="281" class="anno">completedCount (bright) / totalCount (muted) issues.</text>
  <text x="598" y="299" class="labn">The bar is the value; the percent is the precise readout.</text>

  <line x1="32" y1="332" x2="848" y2="332" class="div"/>

  <!-- ===================== SIZES + EMPTY ===================== -->
  <text x="32" y="358" class="sec">MEDIUM (2×1) · LARGE (2×2) · EMPTY (active: false)</text>

  <!-- ===== MEDIUM ===== -->
  <text x="32" y="382" class="cap" style="letter-spacing:1px">MEDIUM (2×1) · COMPACT</text>
  <rect x="32" y="392" width="288" height="112" rx="14" fill="#16161D" stroke="#2A2A36"/>
  <text x="50" y="418" class="cap">LINEAR · CURRENT CYCLE</text>
  <use href="#refresh" transform="translate(296 414)"/>
  <text x="50" y="446" class="cycSm">Cycle 8: Polish sprint</text>
  <text x="302" y="448" text-anchor="end" class="pct" font-size="20">67%</text>
  <rect class="track" x="50" y="460" width="252" height="12" rx="6"/>
  <rect class="fill"  x="50" y="460" width="169" height="12" rx="6"/>
  <text x="50" y="492"><tspan class="cDone" font-size="13">16</tspan> <tspan class="cRest" font-size="13">/ 24 issues</tspan></text>

  <!-- ===== LARGE ===== -->
  <text x="344" y="382" class="cap" style="letter-spacing:1px">LARGE (2×2) · BIG READOUT</text>
  <rect x="344" y="392" width="248" height="208" rx="14" fill="#16161D" stroke="#2A2A36"/>
  <text x="362" y="418" class="cap">LINEAR · CURRENT CYCLE</text>
  <use href="#refresh" transform="translate(568 414)"/>
  <text x="362" y="446" class="cyc">Cycle 8: Polish sprint</text>
  <text x="468" y="506" text-anchor="middle" class="pct" font-size="58">67%</text>
  <rect class="track" x="362" y="528" width="212" height="16" rx="8"/>
  <rect class="fill"  x="362" y="528" width="142" height="16" rx="8"/>
  <text x="362" y="572"><tspan class="cDone" font-size="14">16</tspan> <tspan class="cRest" font-size="14">/ 24 issues</tspan></text>
  <text x="574" y="572" text-anchor="end" class="meta" font-size="12">ends in 3 days</text>

  <!-- ===== EMPTY ===== -->
  <text x="616" y="382" class="cap" style="letter-spacing:1px">EMPTY (active: false)</text>
  <rect x="616" y="392" width="232" height="112" rx="14" fill="#16161D" stroke="#2A2A36"/>
  <text x="634" y="418" class="cap">LINEAR · CURRENT CYCLE</text>
  <use href="#refresh" transform="translate(826 414)"/>
  <use href="#cycle-empty" transform="translate(719 432) scale(0.92)"/>
  <text x="732" y="478" text-anchor="middle" class="empty">No active cycle</text>
  <text x="732" y="496" text-anchor="middle" class="emptysub">No cycle running</text>

  <!-- ===== TOKEN PANEL ===== -->
  <rect x="616" y="516" width="232" height="84" rx="12" fill="#121219" stroke="#2A2A36"/>
  <text x="634" y="538" class="ph">progress token group</text>
  <text x="634" y="557" class="pb"><tspan class="pk">trackHeight</tspan> medium 12 / large 16</text>
  <text x="634" y="573" class="pb"><tspan class="pk">fill</tspan> accent · <tspan class="pk">track</tspan> accent @ 0.18</text>
  <text x="634" y="589" class="pb">specified, not coded · no new colour</text>

  <text x="32" y="540" class="anno"><tspan class="annob">Reuses AOD-37 unchanged:</tspan> the card chrome (§4),</text>
  <text x="32" y="558" class="anno">the six states (§5), the empty body (§5.1),</text>
  <text x="32" y="576" class="anno">refresh (§6), and the overlay dim (§7).</text>
  <text x="32" y="594" class="anno"><tspan class="annob">Bespoke to AOD-30:</tspan> the progress bar + percent.</text>
</svg>
