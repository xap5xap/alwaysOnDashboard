<svg width="100%" viewBox="0 0 900 624" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>The Vela weather icon set: eight condition groups with a day/night rule</title>
  <desc>A reference sheet of the weather icon set that AOD-35 designs. Eight monochrome line glyphs, one per WeatherGroup the normalized payload carries: clear, cloudy, fog, drizzle, rain, showers, snow, and thunderstorm, each labelled with the WMO weather codes it covers. The glyphs are drawn as thin line icons in the foreground text colour, matching the chrome glyphs from the AOD-37 system, so the condition is carried by shape rather than colour and never competes with the temperature value or clashes with the amber stale dot. Below the grid, a day/night strip shows the three groups whose glyph changes with the payload is-day flag (clear, cloudy, showers): a crescent moon replaces the sun. The other five groups are overcast or precipitating, so their glyph is the same by day or night. A panel records the rule, the single new token group weatherIcon (sizes and a 2 unit stroke, specified not coded), and that forecast days always use the day form.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .h{font-size:15px;font-weight:700;fill:#F4F4F8;}
    .sub{font-size:11.5px;fill:#9B9BA8;}
    .sec{font-size:11px;font-weight:700;fill:#9B9BA8;letter-spacing:1px;}
    .name{font-size:12.5px;font-weight:700;fill:#F4F4F8;}
    .codes{font-size:10.5px;fill:#8A8A97;font-variant:tabular-nums;}
    .slash{font-size:16px;fill:#3A3A46;}
    .ph{font-size:12px;font-weight:700;fill:#F4F4F8;}
    .pb{font-size:11.5px;fill:#C9C9D4;}
    .pk{font-size:11.5px;font-weight:700;fill:#6E8BFF;}
    .gly{fill:none;stroke:#F4F4F8;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .gly *{vector-effect:non-scaling-stroke;}
    .fillsurf{fill:#16161D;}
  </style>

  <defs>
    <!-- clear: sun -->
    <g id="ic-clear-day" class="gly">
      <circle cx="12" cy="12" r="4.4"/>
      <line x1="12" y1="1.6" x2="12" y2="4.2"/><line x1="12" y1="19.8" x2="12" y2="22.4"/>
      <line x1="1.6" y1="12" x2="4.2" y2="12"/><line x1="19.8" y1="12" x2="22.4" y2="12"/>
      <line x1="4.6" y1="4.6" x2="6.5" y2="6.5"/><line x1="17.5" y1="17.5" x2="19.4" y2="19.4"/>
      <line x1="4.6" y1="19.4" x2="6.5" y2="17.5"/><line x1="17.5" y1="6.5" x2="19.4" y2="4.6"/>
    </g>
    <!-- clear: moon -->
    <g id="ic-clear-night" class="gly">
      <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/>
    </g>
    <!-- cloudy day: small sun behind a surface-filled cloud -->
    <g id="ic-cloudy-day" class="gly">
      <g transform="translate(8 7.5)">
        <circle cx="0" cy="0" r="2.5"/>
        <line x1="0" y1="-5.6" x2="0" y2="-3.8"/><line x1="-5.6" y1="0" x2="-3.8" y2="0"/>
        <line x1="-4" y1="-4" x2="-2.7" y2="-2.7"/><line x1="-4" y1="4" x2="-2.7" y2="2.7"/><line x1="4" y1="-4" x2="2.7" y2="-2.7"/>
      </g>
      <path class="fillsurf" d="M18 11h-1.26A8 8 0 1 0 9 21h9a5 5 0 0 0 0-10z" transform="translate(1.5 -1) scale(0.84)"/>
    </g>
    <!-- cloudy night: small moon behind a surface-filled cloud -->
    <g id="ic-cloudy-night" class="gly">
      <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z" transform="translate(8 7.6) scale(0.46) translate(-12 -12)"/>
      <path class="fillsurf" d="M18 11h-1.26A8 8 0 1 0 9 21h9a5 5 0 0 0 0-10z" transform="translate(1.5 -1) scale(0.84)"/>
    </g>
    <!-- fog: cloud + three drifting lines -->
    <g id="ic-fog" class="gly">
      <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" transform="translate(1.8 -3.4) scale(0.78)"/>
      <line x1="5.5" y1="17.4" x2="16.5" y2="17.4"/>
      <line x1="7" y1="20" x2="18.5" y2="20"/>
      <line x1="5.5" y1="22.4" x2="14.5" y2="22.4"/>
    </g>
    <!-- drizzle: cloud + short light dashes -->
    <g id="ic-drizzle" class="gly">
      <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" transform="translate(1.8 -3.4) scale(0.78)"/>
      <line x1="8.5" y1="16.8" x2="7.8" y2="18.8"/>
      <line x1="12.5" y1="16.8" x2="11.8" y2="18.8"/>
      <line x1="16.5" y1="16.8" x2="15.8" y2="18.8"/>
    </g>
    <!-- rain: cloud + three streaks -->
    <g id="ic-rain" class="gly">
      <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" transform="translate(1.8 -3.4) scale(0.78)"/>
      <line x1="8.6" y1="16.4" x2="6.9" y2="21.2"/>
      <line x1="12.6" y1="16.4" x2="10.9" y2="21.2"/>
      <line x1="16.6" y1="16.4" x2="14.9" y2="21.2"/>
    </g>
    <!-- showers day: small sun + cloud + two longer streaks -->
    <g id="ic-showers-day" class="gly">
      <g transform="translate(8 7)">
        <circle cx="0" cy="0" r="2.3"/>
        <line x1="0" y1="-5.2" x2="0" y2="-3.6"/><line x1="-5.2" y1="0" x2="-3.6" y2="0"/>
        <line x1="-3.7" y1="-3.7" x2="-2.5" y2="-2.5"/><line x1="3.7" y1="-3.7" x2="2.5" y2="-2.5"/>
      </g>
      <path class="fillsurf" d="M18 11h-1.26A8 8 0 1 0 9 21h9a5 5 0 0 0 0-10z" transform="translate(2 -1.6) scale(0.78)"/>
      <line x1="9.5" y1="16.6" x2="7.4" y2="22"/>
      <line x1="15" y1="16.6" x2="12.9" y2="22"/>
    </g>
    <!-- showers night: small moon + cloud + two longer streaks -->
    <g id="ic-showers-night" class="gly">
      <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z" transform="translate(8 7.1) scale(0.42) translate(-12 -12)"/>
      <path class="fillsurf" d="M18 11h-1.26A8 8 0 1 0 9 21h9a5 5 0 0 0 0-10z" transform="translate(2 -1.6) scale(0.78)"/>
      <line x1="9.5" y1="16.6" x2="7.4" y2="22"/>
      <line x1="15" y1="16.6" x2="12.9" y2="22"/>
    </g>
    <!-- snow: cloud + three flakes -->
    <g id="ic-snow" class="gly">
      <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" transform="translate(1.8 -3.4) scale(0.78)"/>
      <g style="stroke-width:1.5">
        <g transform="translate(7.8 18)"><line x1="0" y1="-1.6" x2="0" y2="1.6"/><line x1="-1.4" y1="-0.8" x2="1.4" y2="0.8"/><line x1="-1.4" y1="0.8" x2="1.4" y2="-0.8"/></g>
        <g transform="translate(16.2 18)"><line x1="0" y1="-1.6" x2="0" y2="1.6"/><line x1="-1.4" y1="-0.8" x2="1.4" y2="0.8"/><line x1="-1.4" y1="0.8" x2="1.4" y2="-0.8"/></g>
        <g transform="translate(12 21.6)"><line x1="0" y1="-1.6" x2="0" y2="1.6"/><line x1="-1.4" y1="-0.8" x2="1.4" y2="0.8"/><line x1="-1.4" y1="0.8" x2="1.4" y2="-0.8"/></g>
      </g>
    </g>
    <!-- thunderstorm: cloud + bolt -->
    <g id="ic-storm" class="gly">
      <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" transform="translate(1.8 -3.6) scale(0.78)"/>
      <path d="M13.4 15.6 L9.6 20.2 H12.2 L10.6 23.4"/>
    </g>
  </defs>

  <rect x="0.5" y="0.5" width="899" height="623" rx="12" fill="#0B0B0F" stroke="#1E1E26"/>
  <text x="32" y="38" class="h">Weather icon set: eight condition groups, carried by shape</text>
  <text x="32" y="58" class="sub">Line glyphs in colors.text, matching the AOD-37 chrome glyphs. One per WeatherGroup; the renderer maps the group (+ isDay), never the raw WMO code.</text>

  <!-- ===== day grid: 2 rows x 4 ===== -->
  <text x="32" y="92" class="sec">CONDITION GROUPS · DAY FORM</text>

  <!-- row 1 -->
  <use href="#ic-clear-day" transform="translate(117 122) scale(2.04)"/>
  <text x="140" y="196" text-anchor="middle" class="name">clear</text>
  <text x="140" y="213" text-anchor="middle" class="codes">0</text>

  <use href="#ic-cloudy-day" transform="translate(337 122) scale(2.04)"/>
  <text x="360" y="196" text-anchor="middle" class="name">cloudy</text>
  <text x="360" y="213" text-anchor="middle" class="codes">1 · 2 · 3</text>

  <use href="#ic-fog" transform="translate(557 122) scale(2.04)"/>
  <text x="580" y="196" text-anchor="middle" class="name">fog</text>
  <text x="580" y="213" text-anchor="middle" class="codes">45 · 48</text>

  <use href="#ic-drizzle" transform="translate(777 122) scale(2.04)"/>
  <text x="800" y="196" text-anchor="middle" class="name">drizzle</text>
  <text x="800" y="213" text-anchor="middle" class="codes">51–57</text>

  <!-- row 2 -->
  <use href="#ic-rain" transform="translate(117 240) scale(2.04)"/>
  <text x="140" y="314" text-anchor="middle" class="name">rain</text>
  <text x="140" y="331" text-anchor="middle" class="codes">61–67</text>

  <use href="#ic-showers-day" transform="translate(337 240) scale(2.04)"/>
  <text x="360" y="314" text-anchor="middle" class="name">showers</text>
  <text x="360" y="331" text-anchor="middle" class="codes">80–82</text>

  <use href="#ic-snow" transform="translate(557 240) scale(2.04)"/>
  <text x="580" y="314" text-anchor="middle" class="name">snow</text>
  <text x="580" y="331" text-anchor="middle" class="codes">71–77 · 85 · 86</text>

  <use href="#ic-storm" transform="translate(777 240) scale(2.04)"/>
  <text x="800" y="314" text-anchor="middle" class="name">thunderstorm</text>
  <text x="800" y="331" text-anchor="middle" class="codes">95 · 96 · 99</text>

  <line x1="32" y1="356" x2="868" y2="356" stroke="#22222C"/>

  <!-- ===== day / night strip ===== -->
  <text x="32" y="384" class="sec">DAY / NIGHT · THREE GROUPS SWAP THE CELESTIAL ELEMENT (isDay)</text>

  <!-- clear pair -->
  <use href="#ic-clear-day" transform="translate(96 404) scale(1.6)"/>
  <text x="150" y="436" text-anchor="middle" class="slash">/</text>
  <use href="#ic-clear-night" transform="translate(176 404) scale(1.6)"/>
  <text x="150" y="470" text-anchor="middle" class="name">clear</text>
  <text x="150" y="486" text-anchor="middle" class="codes">sun → moon</text>

  <!-- cloudy pair -->
  <use href="#ic-cloudy-day" transform="translate(326 404) scale(1.6)"/>
  <text x="380" y="436" text-anchor="middle" class="slash">/</text>
  <use href="#ic-cloudy-night" transform="translate(406 404) scale(1.6)"/>
  <text x="380" y="470" text-anchor="middle" class="name">cloudy</text>
  <text x="380" y="486" text-anchor="middle" class="codes">sun → moon, behind cloud</text>

  <!-- showers pair -->
  <use href="#ic-showers-day" transform="translate(556 404) scale(1.6)"/>
  <text x="610" y="436" text-anchor="middle" class="slash">/</text>
  <use href="#ic-showers-night" transform="translate(636 404) scale(1.6)"/>
  <text x="610" y="470" text-anchor="middle" class="name">showers</text>
  <text x="610" y="486" text-anchor="middle" class="codes">sun → moon, intermittent</text>

  <!-- invariant note -->
  <rect x="712" y="392" width="156" height="104" rx="12" fill="#121219" stroke="#2A2A36"/>
  <text x="730" y="418" class="pb">The other five</text>
  <text x="730" y="436" class="pb">(fog, drizzle, rain,</text>
  <text x="730" y="454" class="pb">snow, thunderstorm)</text>
  <text x="730" y="472" class="pb">are overcast, so the</text>
  <text x="730" y="490" class="pb">glyph is isDay-invariant.</text>

  <!-- ===== panel ===== -->
  <rect x="32" y="516" width="836" height="92" rx="12" fill="#121219" stroke="#2A2A36"/>
  <text x="52" y="542" class="ph">Bespoke to AOD-35. Reuses colors.text from §3; adds one token group.</text>
  <text x="52" y="564" class="pb">Token <tspan class="pk">weatherIcon</tspan> (specified, not coded): size ramp <tspan class="pk">currentHero 44 · currentSmall 34 · forecastStrip 30 · forecastRow 22</tspan>, stroke <tspan class="pk">2</tspan>, drawn in <tspan class="pk">colors.text</tspan>.</text>
  <text x="52" y="584" class="pb">Monochrome on purpose: the condition reads by shape, the temperature stays the one bright value, and no icon tint collides with the amber stale dot or the blue accent.</text>
  <text x="52" y="602" class="pb">Forecast days carry isDay = true, so a forecast always uses the day form (§4.2). The cloud fill is colors.surface, so the sun or moon is cleanly occluded behind it.</text>
</svg>
