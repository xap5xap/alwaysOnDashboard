<svg width="100%" viewBox="0 0 760 410" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Current Weather lifecycle: the simplest platform_key case (reuses widget-model section 9)</title>
  <desc>The Weather Current widget is added while Weather is connected. It is zero-config: the only choice, the location, lives on the connection (set at connect), not the widget, so there is no config form. After adding, the instance enters Loading and goes to Fresh on a proxy 200 carrying CurrentWeatherData. Fresh refreshes on a 900 second tick from cache or provider; it becomes Stale when a refresh is overdue past 900 seconds, and Error on a provider failure (an Open-Meteo rate limit is HTTP 429, mapped to rate_limited with backoff; any other non-2xx is provider_unavailable). Stale returns to Fresh on a later successful tick, and Error recovers to Fresh on a recovery tick. Because platform_key has no per-user credential that can expire or be revoked, there is no reauth or Disconnected edge and no NeedsConfig edge; the 429 is the shared per-IP free-tier budget.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .cap{font-size:13px;font-weight:600;fill:#1a1a1a;}
    .ts{font-size:11px;fill:#5b5b5b;}
    .st{font-size:13px;font-weight:600;fill:#1a1a1a;}
    .edge{fill:none;stroke:#7a7a7a;stroke-width:1.5;}
    .note{font-size:10.5px;fill:#6a6a6a;}
    .notebox{fill:#fafafa;stroke:#dadada;stroke-width:0.8;stroke-dasharray:4 4;}
    .bg-blue{fill:#dce8fb;stroke:#6e97d6;stroke-width:1;}
    .bg-green{fill:#dcf3e3;stroke:#5aa97a;stroke-width:1.2;}
    .bg-amber{fill:#fbecc9;stroke:#cda12f;stroke-width:1;}
    .bg-gray{fill:#ededed;stroke:#b4b4b4;stroke-width:1;}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="759" height="409" rx="10" fill="#ffffff" stroke="#e6e6e6"/>
  <text x="36" y="30" class="cap">Current Weather: the simplest platform_key lifecycle (reuses widget-model §9)</text>

  <!-- start dot -->
  <circle cx="170" cy="64" r="6" fill="#1a1a1a"/>
  <path d="M170 70 V82" class="edge" marker-end="url(#arrow)"/>

  <!-- states -->
  <rect x="95" y="82" width="150" height="44" rx="8" class="bg-gray"/>
  <text x="170" y="109" text-anchor="middle" class="st">Loading</text>

  <rect x="95" y="178" width="150" height="44" rx="8" class="bg-green"/>
  <text x="170" y="205" text-anchor="middle" class="st">Fresh</text>

  <rect x="335" y="178" width="150" height="44" rx="8" class="bg-blue"/>
  <text x="410" y="205" text-anchor="middle" class="st">Stale</text>

  <rect x="95" y="274" width="150" height="44" rx="8" class="bg-amber"/>
  <text x="170" y="301" text-anchor="middle" class="st">Error</text>

  <!-- start -> Loading already; Loading -> Fresh -->
  <path d="M170 126 V178" class="edge" marker-end="url(#arrow)"/>
  <text x="178" y="156" class="ts">proxy 200, CurrentWeatherData</text>

  <!-- Fresh self tick -->
  <path d="M95 190 C58 190 58 210 95 210" class="edge" marker-end="url(#arrow)"/>
  <text x="20" y="184" class="ts">900s tick</text>

  <!-- Fresh <-> Stale -->
  <path d="M245 192 H335" class="edge" marker-end="url(#arrow)"/>
  <text x="252" y="186" class="ts">overdue &gt; 900s</text>
  <path d="M335 208 H245" class="edge" marker-end="url(#arrow)"/>
  <text x="256" y="220" class="ts">tick succeeds</text>

  <!-- Fresh <-> Error -->
  <path d="M157 222 V274" class="edge" marker-end="url(#arrow)"/>
  <text x="40" y="252" class="ts">429 / 5xx, backoff</text>
  <path d="M183 274 V222" class="edge" marker-end="url(#arrow)"/>
  <text x="189" y="252" class="ts">recovery</text>

  <!-- notes -->
  <rect x="40" y="336" width="330" height="56" rx="8" class="notebox"/>
  <text x="54" y="357" class="note">Zero-config: the location is on the connection</text>
  <text x="54" y="374" class="note">(set at connect), not the widget. No config form,</text>
  <text x="54" y="388" class="note">so no NeedsConfig edge (no remote-options field).</text>

  <rect x="400" y="336" width="320" height="56" rx="8" class="notebox"/>
  <text x="414" y="357" class="note">platform_key has no per-user credential, so no</text>
  <text x="414" y="374" class="note">reauth / Disconnected edge. The 429 is the shared</text>
  <text x="414" y="388" class="note">per-IP free-tier budget (§7.3), not a per-user limit.</text>
</svg>
