<svg width="100%" viewBox="0 0 860 580" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Vela Settings home and Account screens, composed from the component library</title>
  <desc>Left: the Settings home as a device frame. A pushed header with a back chevron and the title Settings, then a Connections row-group tagged as owned by AOD-28 showing Linear and Google Calendar connected with a Disconnect action and Weather not connected with a Connect action, then navigation rows: a Themes lock row and a Kiosk Mode lock row each with a padlock, a muted title, a PRO badge, and a chevron that routes to the paywall, and an Account row with a chevron. Right: the Account screen as a device frame. A pushed header with a back chevron and the title Account, an identity block with an email and a Free plan label, a Manage subscription row with a chevron, a Sign out action in accent, and a Delete account action in the destructive color. A note states sign out is relocated here from the Dashboard header. A footer states this design places the settings sections and nav rows; the connections interior is AOD-28.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .h{font-size:16px;font-weight:700;fill:#F4F4F8;}
    .sub{font-size:11.5px;fill:#9B9BA8;}
    .sec{font-size:11px;font-weight:700;fill:#C9C9D4;letter-spacing:1px;}
    .cap{font-size:9px;font-weight:700;fill:#9B9BA8;letter-spacing:1px;}
    .title{font-size:13.5px;font-weight:600;fill:#F4F4F8;}
    .titlem{font-size:13.5px;font-weight:600;fill:#9B9BA8;}
    .meta{font-size:10.5px;fill:#9B9BA8;}
    .acc{fill:#6E8BFF;font-weight:700;}
    .err{fill:#FF6B6B;font-weight:700;}
    .badge{font-size:9px;font-weight:700;letter-spacing:1px;fill:#6E8BFF;}
    .tok{font-size:9px;fill:#8A8A97;font-family:ui-monospace,Menlo,monospace;}
    .note{font-size:11px;fill:#C9C9D4;}
    .cal{font-size:8.5px;fill:#8A8A97;font-family:ui-monospace,Menlo,monospace;}
  </style>
  <rect x="0.5" y="0.5" width="859" height="579" rx="12" fill="#0B0B0F" stroke="#1E1E26"/>
  <text x="32" y="40" class="h">Settings home · Account</text>
  <text x="32" y="60" class="sub">Two core-nav screens: the secondary hub and the account surface. Row-groups, list rows, and lock rows from AOD-20.</text>

  <!-- ===== SETTINGS HOME ===== -->
  <text x="32" y="92" class="cap">SETTINGS · home · the secondary hub</text>
  <rect x="32" y="104" width="372" height="452" rx="28" fill="#0B0B0F" stroke="#2A2A36"/>
  <!-- header -->
  <path d="M58,150 l-9,7 l9,7" fill="none" stroke="#6E8BFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="78" y="162" class="title" font-size="16">Settings</text>
  <!-- connections group -->
  <text x="48" y="192" class="cap">CONNECTIONS</text>
  <text x="388" y="192" text-anchor="end" class="cal" fill="#6E8BFF">interior → AOD-28</text>
  <rect x="48" y="200" width="340" height="150" rx="14" fill="#16161D" stroke="#2A2A36"/>
  <text x="64" y="224" class="title">Linear</text><text x="64" y="240" class="meta">Connected · xavier</text>
  <text x="372" y="232" text-anchor="end" class="err" font-size="11">Disconnect</text>
  <line x1="64" y1="252" x2="372" y2="252" stroke="#2A2A36"/>
  <text x="64" y="276" class="title">Google Calendar</text><text x="64" y="292" class="meta">Connected</text>
  <text x="372" y="284" text-anchor="end" class="err" font-size="11">Disconnect</text>
  <line x1="64" y1="304" x2="372" y2="304" stroke="#2A2A36"/>
  <text x="64" y="328" class="title">Weather</text><text x="64" y="344" class="meta">Not connected</text>
  <text x="372" y="336" text-anchor="end" class="acc" font-size="11">Connect</text>
  <!-- nav rows: Themes lock -->
  <rect x="48" y="362" width="340" height="44" rx="12" fill="#16161D" stroke="#2A2A36"/>
  <rect x="64" y="377" width="15" height="11" rx="2.5" fill="none" stroke="#9B9BA8" stroke-width="1.6"/>
  <path d="M67,377 v-3 a4.5 4.5 0 0 1 9 0 v3" fill="none" stroke="#9B9BA8" stroke-width="1.6"/>
  <text x="92" y="389" class="titlem">Themes</text>
  <rect x="300" y="373" width="40" height="20" rx="10" fill="#6E8BFF" fill-opacity="0.14" stroke="#6E8BFF" stroke-opacity="0.5"/><text x="320" y="387" text-anchor="middle" class="badge">PRO</text>
  <path d="M360,378 l6,6 l-6,6" fill="none" stroke="#9B9BA8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Kiosk lock -->
  <rect x="48" y="414" width="340" height="44" rx="12" fill="#16161D" stroke="#2A2A36"/>
  <rect x="64" y="429" width="15" height="11" rx="2.5" fill="none" stroke="#9B9BA8" stroke-width="1.6"/>
  <path d="M67,429 v-3 a4.5 4.5 0 0 1 9 0 v3" fill="none" stroke="#9B9BA8" stroke-width="1.6"/>
  <text x="92" y="441" class="titlem">Kiosk Mode</text>
  <rect x="300" y="425" width="40" height="20" rx="10" fill="#6E8BFF" fill-opacity="0.14" stroke="#6E8BFF" stroke-opacity="0.5"/><text x="320" y="439" text-anchor="middle" class="badge">PRO</text>
  <path d="M360,430 l6,6 l-6,6" fill="none" stroke="#9B9BA8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Account row -->
  <rect x="48" y="466" width="340" height="44" rx="12" fill="#16161D" stroke="#2A2A36"/>
  <text x="64" y="493" class="title">Account</text>
  <path d="M360,482 l6,6 l-6,6" fill="none" stroke="#9B9BA8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="48" y="534" class="cal" fill="#6E8BFF">lock rows = Gate fallback → paywall (trigger=themes / kiosk)</text>

  <!-- ===== ACCOUNT ===== -->
  <text x="458" y="92" class="cap">ACCOUNT · sign out · deletion · subscription</text>
  <rect x="458" y="104" width="370" height="452" rx="28" fill="#0B0B0F" stroke="#2A2A36"/>
  <path d="M484,150 l-9,7 l9,7" fill="none" stroke="#6E8BFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="504" y="162" class="title" font-size="16">Account</text>
  <!-- identity -->
  <rect x="474" y="190" width="338" height="64" rx="14" fill="#16161D" stroke="#2A2A36"/>
  <text x="490" y="218" class="title">xavier@example.com</text>
  <text x="490" y="238" class="meta">Free plan</text>
  <text x="796" y="227" text-anchor="end" class="acc" font-size="11">Upgrade</text>
  <!-- manage subscription -->
  <rect x="474" y="268" width="338" height="44" rx="12" fill="#16161D" stroke="#2A2A36"/>
  <text x="490" y="295" class="title">Manage subscription</text>
  <text x="760" y="295" text-anchor="end" class="meta" font-size="10">App Store</text>
  <path d="M788,284 l6,6 l-6,6" fill="none" stroke="#9B9BA8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- sign out -->
  <rect x="474" y="324" width="338" height="44" rx="12" fill="#16161D" stroke="#2A2A36"/>
  <text x="490" y="351" class="title acc">Sign out</text>
  <!-- delete account -->
  <rect x="474" y="380" width="338" height="44" rx="12" fill="#16161D" stroke="#2A2A36"/>
  <text x="490" y="407" class="title err">Delete account</text>
  <!-- note -->
  <rect x="474" y="444" width="338" height="66" rx="10" fill="#0E0E13" stroke="#22222C"/>
  <text x="490" y="466" class="note" fill="#6E8BFF" font-weight="700">Sign out relocated here.</text>
  <text x="490" y="484" class="tok">moved off the Dashboard header (AOD-17 §5 / §9)</text>
  <text x="490" y="500" class="tok">deletion = AOD-5 E2 · subscription = RevenueCat link</text>

  <line x1="32" y1="556" x2="828" y2="556" stroke="#22222C"/>
  <text x="32" y="574" class="note"><tspan fill="#6E8BFF" font-weight="700">Shell places the sections and nav rows.</tspan> Settings is the secondary hub for Connections, Themes, and Account; the detail is AOD-28.</text>
</svg>
