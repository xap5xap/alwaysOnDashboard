<svg width="100%" viewBox="0 0 860 578" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Vela add-widget picker: the in-screen sheet interior over the dashboard</title>
  <desc>Left: the add-widget picker as a bottom sheet over a dimmed dashboard under a scrim. The sheet has a grabber handle, an Add widget title with a Close action, then the addable widgets grouped by their publishing service: Linear with My Issues and Current Cycle, Google Calendar with Next Event and Todays Agenda, and a Clock row peeking at the bottom. Each row is a title with a trailing accent Add. Right: the sheet presentation reused from AOD-21 section 7, the scrim plus the overlay elevation plus the grabber, with this design fixing only the interior; the interior structure naming addableWidgets grouped by service and the AOD-8 seam that grows it by one group per integration; the configure-on-add path and the loading, error, and nothing-addable states; and a token block.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .h{font-size:16px;font-weight:700;fill:#F4F4F8;}
    .sub{font-size:11.5px;fill:#9B9BA8;}
    .sec{font-size:11px;font-weight:700;fill:#C9C9D4;letter-spacing:1px;}
    .cap{font-size:9px;font-weight:700;fill:#9B9BA8;letter-spacing:1px;}
    .title{font-size:13px;font-weight:600;fill:#F4F4F8;}
    .meta{font-size:10.5px;fill:#9B9BA8;}
    .acc{fill:#6E8BFF;font-weight:700;}
    .tok{font-size:9px;fill:#8A8A97;font-family:ui-monospace,Menlo,monospace;}
    .note{font-size:11px;fill:#C9C9D4;}
    .row{font-size:11px;fill:#C9C9D4;}
    .sheetTitle{font-size:15px;font-weight:700;fill:#F4F4F8;}
    .item{font-size:12.5px;font-weight:600;fill:#F4F4F8;}
  </style>
  <rect x="0.5" y="0.5" width="859" height="577" rx="12" fill="#0B0B0F" stroke="#1E1E26"/>
  <text x="32" y="40" class="h">Add widget · the picker sheet interior</text>
  <text x="32" y="60" class="sub">The AOD-21 §7 in-screen sheet, reused. The interior is addableWidgets grouped by service: the AOD-8 registry seam, drawn.</text>

  <!-- ===== DEVICE FRAME ===== -->
  <text x="32" y="92" class="cap">DASHBOARD · widget picker open</text>
  <rect x="32" y="104" width="320" height="440" rx="28" fill="#0B0B0F" stroke="#2A2A36"/>
  <!-- dimmed dashboard behind -->
  <g opacity="0.3">
    <path d="M64,150 L66.5,155.5 L72,158 L66.5,160.5 L64,166 L61.5,160.5 L56,158 L61.5,155.5 Z" fill="#6E8BFF"/>
    <text x="80" y="164" class="word" font-size="16" fill="#F4F4F8" font-weight="500">vela</text>
    <rect x="56" y="184" width="120" height="60" rx="12" fill="#16161D" stroke="#2A2A36"/>
    <rect x="188" y="184" width="140" height="60" rx="12" fill="#16161D" stroke="#2A2A36"/>
  </g>
  <!-- scrim -->
  <rect x="33" y="105" width="318" height="438" rx="27" fill="#000000" fill-opacity="0.6"/>

  <!-- sheet (elevation.overlay = surfaceAlt) -->
  <path d="M46,300 h292 v210 a0,0 0 0 1 0,0 h-292 a0,0 0 0 1 0,0 z M46,300 a14,14 0 0 1 14,-14 h264 a14,14 0 0 1 14,14" fill="#1F1F29" stroke="#2A2A36"/>
  <rect x="46" y="300" width="292" height="232" fill="#1F1F29"/>
  <rect x="46" y="286" width="292" height="232" rx="14" fill="#1F1F29" stroke="#2A2A36"/>
  <!-- grabber -->
  <rect x="182" y="296" width="36" height="4" rx="2" fill="#3A3A46"/>
  <!-- header -->
  <text x="62" y="324" class="sheetTitle">Add widget</text>
  <text x="322" y="324" text-anchor="end" class="acc" font-size="12">Close</text>

  <!-- LINEAR group -->
  <text x="62" y="350" class="cap">LINEAR</text>
  <line x1="62" y1="358" x2="322" y2="358" stroke="#2A2A36"/>
  <text x="62" y="376" class="item">My Issues</text>
  <text x="322" y="376" text-anchor="end" class="acc" font-size="12">Add</text>
  <line x1="62" y1="386" x2="322" y2="386" stroke="#2A2A36"/>
  <text x="62" y="404" class="item">Current Cycle</text>
  <text x="322" y="404" text-anchor="end" class="acc" font-size="12">Add</text>

  <!-- GOOGLE CALENDAR group -->
  <text x="62" y="430" class="cap">GOOGLE CALENDAR</text>
  <line x1="62" y1="438" x2="322" y2="438" stroke="#2A2A36"/>
  <text x="62" y="456" class="item">Next Event</text>
  <text x="322" y="456" text-anchor="end" class="acc" font-size="12">Add</text>
  <line x1="62" y1="466" x2="322" y2="466" stroke="#2A2A36"/>
  <text x="62" y="484" class="item">Today's Agenda</text>
  <text x="322" y="484" text-anchor="end" class="acc" font-size="12">Add</text>

  <!-- CLOCK peek (always addable, authClass none) -->
  <g opacity="0.5">
    <text x="62" y="510" class="cap">CLOCK</text>
    <text x="322" y="510" text-anchor="end" class="meta" font-size="9">always addable</text>
  </g>

  <!-- ===== RIGHT COLUMN ===== -->
  <!-- presentation -->
  <text x="386" y="118" class="sec">SHEET PRESENTATION (AOD-21 §7, REUSED)</text>
  <rect x="386" y="130" width="442" height="58" rx="10" fill="#101016" stroke="#2A2A36"/>
  <text x="402" y="152" class="row">scrim over the dashboard + sheet at elevation.overlay + grabber.</text>
  <text x="402" y="172" class="meta" font-size="10">An in-screen RN Modal owned by the dashboard, carrying the active layout.</text>

  <!-- interior -->
  <text x="386" y="212" class="sec">INTERIOR: addableWidgets, GROUPED BY SERVICE</text>
  <rect x="386" y="224" width="442" height="96" rx="10" fill="#0E0E14" stroke="#2A2A36"/>
  <text x="402" y="246" class="row"><tspan class="acc">addableWidgets(connected)</tspan>  only widgets whose parent</text>
  <text x="402" y="262" class="meta" font-size="10">service is connected; Clock (authClass 'none') is the sole exemption.</text>
  <text x="402" y="282" class="row">Grouped under the publishing service, registry order.</text>
  <text x="402" y="302" class="row">Row = widget title + a trailing accent <tspan class="acc">Add</tspan> (the AOD-20 list row).</text>

  <!-- configure-on-add + states -->
  <text x="386" y="344" class="sec">CONFIGURE-ON-ADD + PICKER STATES</text>
  <rect x="386" y="356" width="442" height="120" rx="10" fill="#101016" stroke="#2A2A36"/>
  <text x="402" y="378" class="row">select -&gt; requiresConfiguration? -&gt; config sheet first ("Add")</text>
  <text x="402" y="394" class="meta" font-size="10">else add with schema defaults; the picker stays mounted behind on cancel.</text>
  <text x="402" y="416" class="row"><tspan class="acc">loading</tspan>  "Checking connections..."</text>
  <text x="402" y="436" class="row"><tspan class="acc">error</tspan>  "Could not load your connections."</text>
  <text x="402" y="456" class="row"><tspan class="acc">empty</tspan>  "Connect a service in Settings" + Open Settings</text>

  <!-- AOD-8 seam + tokens -->
  <rect x="386" y="486" width="442" height="34" rx="8" fill="#12121A" stroke="#3A3A57"/>
  <text x="402" y="507" class="note">AOD-8 seam: names no service; +1 group per integration, zero edits here.</text>
  <text x="386" y="544" class="sec">TOKENS</text>
  <rect x="386" y="554" width="442" height="20" rx="6" fill="#101016" stroke="#23232E"/>
  <text x="398" y="568" class="tok">sheet=AOD-20 elevation.overlay · rows=listRow · groupLabel=type.caption</text>
</svg>
