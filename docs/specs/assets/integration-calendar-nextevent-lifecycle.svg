<svg width="100%" viewBox="0 0 780 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Next Event lifecycle: config to every render state, reusing widget-model section 9</title>
  <desc>The Calendar Next Event widget is added while Google Calendar is connected, then configured: calendarId is resolved through config-options (AOD-53) and the stable calendar id is stored, not the calendar summary. After saving, the instance enters Loading. Loading goes to Fresh on a proxy 200 carrying NextEventData, or to Disconnected on a 409 needs_reconnect when a token refresh has failed. Fresh refreshes on a 600 second tick; it becomes Stale when a refresh is overdue past 600 seconds, Error on a provider failure (a Google rate limit is HTTP 403 or 429 with a usageLimits reason; the 403 case is mapped today as provider_unavailable, with backoff), and NeedsConfig if the chosen calendar was deleted and the render-time membership re-check fails. Stale returns to Fresh on a later successful tick; Error recovers to Fresh or escalates to Disconnected on a 409. Disconnected returns to Loading when the user reconnects via oauth2; NeedsConfig returns to Loading after reconfiguration.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .cap{font-size:13px;font-weight:600;fill:#1a1a1a;}
    .ts{font-size:11px;fill:#5b5b5b;}
    .st{font-size:13px;font-weight:600;fill:#1a1a1a;}
    .edge{fill:none;stroke:#7a7a7a;stroke-width:1.5;}
    .note{font-size:10.5px;fill:#6a6a6a;}
    .notebox{fill:#fafafa;stroke:#dadada;stroke-width:0.8;stroke-dasharray:4 4;}
    .bg-blue{fill:#dce8fb;stroke:#6e97d6;stroke-width:1;}
    .bg-green{fill:#dcf3e3;stroke:#5aa97a;stroke-width:1.2;}
    .bg-amber{fill:#fbecc9;stroke:#cda12f;stroke-width:1;}
    .bg-gray{fill:#ededed;stroke:#b4b4b4;stroke-width:1;}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="779" height="519" rx="10" fill="#ffffff" stroke="#e6e6e6"/>
  <text x="36" y="30" class="cap">Next Event: config to every render state (reuses widget-model §9)</text>

  <!-- start dot -->
  <circle cx="385" cy="48" r="6" fill="#1a1a1a"/>
  <path d="M385 54 V60" class="edge" marker-end="url(#arrow)"/>

  <!-- states -->
  <rect x="300" y="60" width="170" height="46" rx="8" class="bg-blue"/>
  <text x="385" y="88" text-anchor="middle" class="st">Config</text>

  <rect x="300" y="142" width="170" height="46" rx="8" class="bg-gray"/>
  <text x="385" y="170" text-anchor="middle" class="st">Loading</text>

  <rect x="300" y="234" width="170" height="46" rx="8" class="bg-green"/>
  <text x="385" y="262" text-anchor="middle" class="st">Fresh</text>

  <rect x="545" y="234" width="160" height="46" rx="8" class="bg-blue"/>
  <text x="625" y="262" text-anchor="middle" class="st">Stale</text>

  <rect x="300" y="330" width="170" height="46" rx="8" class="bg-amber"/>
  <text x="385" y="358" text-anchor="middle" class="st">Error</text>

  <rect x="58" y="330" width="186" height="46" rx="8" class="bg-gray"/>
  <text x="151" y="358" text-anchor="middle" class="st">Disconnected</text>

  <rect x="545" y="330" width="160" height="46" rx="8" class="bg-gray"/>
  <text x="625" y="358" text-anchor="middle" class="st">NeedsConfig</text>

  <!-- Config -> Loading -->
  <path d="M385 106 V142" class="edge" marker-end="url(#arrow)"/>
  <text x="393" y="128" class="ts">calendarId saved</text>

  <!-- Loading -> Fresh -->
  <path d="M385 188 V234" class="edge" marker-end="url(#arrow)"/>
  <text x="393" y="214" class="ts">proxy 200, NextEventData</text>

  <!-- Loading -> Disconnected (409 on first load) -->
  <path d="M300 160 H190 V330" class="edge" marker-end="url(#arrow)"/>
  <text x="196" y="250" class="ts">409 refresh failed</text>

  <!-- Disconnected -> Loading (reconnect) -->
  <path d="M118 330 V165 H300" class="edge" marker-end="url(#arrow)"/>
  <text x="44" y="250" class="ts">reconnect (oauth2)</text>

  <!-- Fresh <-> Stale -->
  <path d="M470 250 H545" class="edge" marker-end="url(#arrow)"/>
  <text x="476" y="244" class="ts">overdue &gt; 600s</text>
  <path d="M545 266 H470" class="edge" marker-end="url(#arrow)"/>
  <text x="476" y="278" class="ts">tick succeeds</text>

  <!-- Fresh <-> Error -->
  <path d="M372 280 V330" class="edge" marker-end="url(#arrow)"/>
  <text x="250" y="304" class="ts">error 403/429/5xx</text>
  <path d="M398 330 V280" class="edge" marker-end="url(#arrow)"/>
  <text x="404" y="320" class="ts">recovery</text>

  <!-- Error -> Disconnected -->
  <path d="M300 353 H244" class="edge" marker-end="url(#arrow)"/>
  <text x="250" y="347" class="ts">409</text>

  <!-- Fresh -> NeedsConfig -->
  <path d="M470 268 H512 V353 H545" class="edge" marker-end="url(#arrow)"/>
  <text x="492" y="300" class="ts">calendar deleted</text>

  <!-- NeedsConfig -> Loading (reconfigured) -->
  <path d="M690 330 V122 H440 V142" class="edge" marker-end="url(#arrow)"/>
  <text x="556" y="116" class="ts">reconfigured</text>

  <!-- notes -->
  <rect x="40" y="412" width="330" height="64" rx="8" class="notebox"/>
  <text x="54" y="434" class="note">google_calendars resolved via config-options (AOD-53).</text>
  <text x="54" y="452" class="note">The stable calendarId is stored, not the summary;</text>
  <text x="54" y="470" class="note">a delete drives the render-time re-check to NeedsConfig.</text>

  <rect x="410" y="412" width="330" height="64" rx="8" class="notebox"/>
  <text x="424" y="434" class="note">Google rate limit is HTTP 403/429 usageLimits;</text>
  <text x="424" y="452" class="note">the 403 case maps today as provider_unavailable (§7.3),</text>
  <text x="424" y="470" class="note">so backoff runs but no reset window is honored.</text>
</svg>
