<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Minimal Geometric 4-Pointed Star -->
    <path id="star" d="M 0 -18 Q 4 -4, 18 0 Q 4 4, 0 18 Q -4 4, -18 0 Q -4 -4, 0 -18 Z" fill="#F9C74F" />
  </defs>

  <!-- App Icon Background (Deep Night-Navy) -->
  <rect width="512" height="512" rx="115" fill="#0A1128" />

  <!-- Left Sail Segment (Warm Light Gold) -->
  <!-- Represents the sail catching the direct light -->
  <path d="M 280 120
           Q 190 250, 140 400
           Q 210 385, 280 375
           Q 270 250, 280 120 Z"
        fill="#F9C74F" />

  <!-- Right Sail Segment (Rich Amber) -->
  <!-- Creates depth and structure using pure flat geometry, no gradients -->
  <path d="M 280 120
           Q 270 250, 280 375
           Q 330 365, 380 360
           Q 350 240, 280 120 Z"
        fill="#E68A00" />

  <!-- Accent Stars -->
  <!-- Top Right Star -->
  <g transform="translate(395, 155) scale(1)">
    <use href="#star" />
  </g>
  
  <!-- Mid Left Star (Smaller) -->
  <g transform="translate(130, 260) scale(0.6)">
    <use href="#star" />
  </g>
</svg>