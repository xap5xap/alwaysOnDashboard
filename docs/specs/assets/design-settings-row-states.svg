<svg width="100%" viewBox="0 0 860 566" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Vela connection row: the state matrix by authClass and status</title>
  <desc>Left panel: the not-connected rows keyed by authClass, oauth2 Linear offering Connect, admin_key Claude usage offering Add key, platform_key Weather offering Set location, and none Clock showing a muted no-connection-needed label. Right panel: the live states keyed by status, connected Google Calendar offering a destructive Disconnect, reauth_required Claude usage with a warning dot offering Reconnect, error Weather with a warning dot offering Reconnect, and a pending row showing an ellipsis while an action is in flight. Below: a per-row error callout showing an inline message under a row, and a connect-gate callout where connecting a third service on the Free plan turns Connect into a padlock with a PRO badge and a chevron that routes to the paywall. A token block names the affordance source and the transient handling.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .h{font-size:16px;font-weight:700;fill:#F4F4F8;}
    .sub{font-size:11.5px;fill:#9B9BA8;}
    .sec{font-size:11px;font-weight:700;fill:#C9C9D4;letter-spacing:1px;}
    .cap{font-size:9px;font-weight:700;fill:#9B9BA8;letter-spacing:1px;}
    .title{font-size:13.5px;font-weight:600;fill:#F4F4F8;}
    .titlem{font-size:13.5px;font-weight:600;fill:#9B9BA8;}
    .meta{font-size:10.5px;fill:#9B9BA8;}
    .acc{fill:#6E8BFF;font-weight:700;}
    .err{fill:#FF6B6B;font-weight:700;}
    .badge{font-size:9px;font-weight:700;letter-spacing:1px;fill:#6E8BFF;}
    .tok{font-size:9px;fill:#8A8A97;font-family:ui-monospace,Menlo,monospace;}
    .note{font-size:11px;fill:#C9C9D4;}
    .cal{font-size:8.5px;fill:#8A8A97;font-family:ui-monospace,Menlo,monospace;}
    .kick{font-size:8.5px;fill:#6E8BFF;font-family:ui-monospace,Menlo,monospace;letter-spacing:0.5px;}
  </style>
  <rect x="0.5" y="0.5" width="859" height="565" rx="12" fill="#0B0B0F" stroke="#1E1E26"/>
  <text x="32" y="40" class="h">Connection row · the state matrix</text>
  <text x="32" y="60" class="sub">One generic row. The affordance is rowAction(authClass, status), never a per-service branch (affordance.ts).</text>

  <!-- ===== LEFT: NOT CONNECTED ===== -->
  <text x="32" y="92" class="cap">NOT CONNECTED → CONNECT (by authClass)</text>
  <rect x="32" y="104" width="372" height="248" rx="14" fill="#16161D" stroke="#2A2A36"/>
  <!-- oauth2 -->
  <text x="48" y="133" class="kick">oauth2</text>
  <text x="48" y="150" class="title">Linear</text><text x="48" y="165" class="meta">Not connected</text>
  <text x="388" y="152" text-anchor="end" class="acc" font-size="12">Connect</text>
  <line x1="48" y1="178" x2="388" y2="178" stroke="#2A2A36"/>
  <!-- admin_key -->
  <text x="48" y="191" class="kick">admin_key</text>
  <text x="48" y="208" class="title">Claude usage</text><text x="48" y="223" class="meta">Not connected</text>
  <text x="388" y="210" text-anchor="end" class="acc" font-size="12">Add key</text>
  <line x1="48" y1="236" x2="388" y2="236" stroke="#2A2A36"/>
  <!-- platform_key -->
  <text x="48" y="249" class="kick">platform_key</text>
  <text x="48" y="266" class="title">Weather</text><text x="48" y="281" class="meta">Not connected</text>
  <text x="388" y="268" text-anchor="end" class="acc" font-size="12">Set location</text>
  <line x1="48" y1="294" x2="388" y2="294" stroke="#2A2A36"/>
  <!-- none -->
  <text x="48" y="307" class="kick">none</text>
  <text x="48" y="324" class="title">Clock</text><text x="48" y="339" class="meta">Built in</text>
  <text x="388" y="326" text-anchor="end" class="meta">No connection needed</text>

  <!-- ===== RIGHT: LIVE STATES ===== -->
  <text x="440" y="92" class="cap">LIVE STATES → DISCONNECT / RECONNECT (by status)</text>
  <rect x="440" y="104" width="388" height="248" rx="14" fill="#16161D" stroke="#2A2A36"/>
  <!-- connected -->
  <text x="456" y="133" class="kick">connected</text>
  <text x="456" y="150" class="title">Google Calendar</text><text x="456" y="165" class="meta">Connected · xavier@gmail.com</text>
  <text x="812" y="152" text-anchor="end" class="err" font-size="12">Disconnect</text>
  <line x1="456" y1="178" x2="812" y2="178" stroke="#2A2A36"/>
  <!-- reauth_required -->
  <text x="456" y="191" class="kick">reauth_required</text>
  <circle cx="462" cy="214" r="4.5" fill="#F2B84B"/>
  <text x="476" y="218" class="title">Claude usage</text><text x="476" y="233" class="meta">Reconnect needed</text>
  <text x="812" y="220" text-anchor="end" class="acc" font-size="12">Reconnect</text>
  <line x1="456" y1="246" x2="812" y2="246" stroke="#2A2A36"/>
  <!-- error -->
  <text x="456" y="259" class="kick">error</text>
  <circle cx="462" cy="282" r="4.5" fill="#F2B84B"/>
  <text x="476" y="286" class="title">Weather</text><text x="476" y="301" class="meta">Error</text>
  <text x="812" y="288" text-anchor="end" class="acc" font-size="12">Reconnect</text>
  <line x1="456" y1="314" x2="812" y2="314" stroke="#2A2A36"/>
  <!-- pending -->
  <text x="456" y="327" class="kick">pending (in-flight)</text>
  <text x="456" y="344" class="title">Linear</text><text x="612" y="344" class="meta">disconnecting…</text>
  <text x="812" y="344" text-anchor="end" class="acc" font-size="13">…</text>

  <!-- ===== BOTTOM: per-row error + connect gate ===== -->
  <text x="32" y="384" class="cap">PER-ROW ERROR (the awaited call failed)</text>
  <rect x="32" y="394" width="372" height="86" rx="12" fill="#16161D" stroke="#2A2A36"/>
  <text x="48" y="422" class="title">Linear</text><text x="48" y="438" class="meta">Not connected</text>
  <text x="388" y="430" text-anchor="end" class="acc" font-size="12">Connect</text>
  <text x="48" y="462" class="err" font-size="11">Something went wrong. Try again.</text>
  <text x="388" y="462" text-anchor="end" class="cal">messageOf(err)</text>

  <text x="440" y="384" class="cap">CONNECT GATE · a 3rd service on Free</text>
  <rect x="440" y="394" width="388" height="86" rx="12" fill="#16161D" stroke="#2A2A36"/>
  <rect x="458" y="424" width="15" height="11" rx="2.5" fill="none" stroke="#9B9BA8" stroke-width="1.6"/>
  <path d="M461,424 v-3 a4.5 4.5 0 0 1 9 0 v3" fill="none" stroke="#9B9BA8" stroke-width="1.6"/>
  <text x="486" y="436" class="titlem">Weather</text>
  <rect x="724" y="421" width="40" height="20" rx="10" fill="#6E8BFF" fill-opacity="0.14" stroke="#6E8BFF" stroke-opacity="0.5"/><text x="744" y="435" text-anchor="middle" class="badge">PRO</text>
  <path d="M788,425 l6,6 l-6,6" fill="none" stroke="#9B9BA8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="456" y="465" class="cal" fill="#6E8BFF">Gate fallback → Paywall (trigger=services) · AOD-12 §7.1</text>

  <text x="32" y="506" class="tok">affordance: rowAction(authClass, status) → connect · reconnect · disconnect · none (the one map)</text>
  <text x="32" y="520" class="tok">transient: pending '…' + inline error wrap each awaited Edge Function call (ConnectionRow)</text>
  <text x="32" y="534" class="tok">disconnect is immediate today; a destructive-confirm modal is a flagged additive (§10)</text>

  <line x1="32" y1="548" x2="828" y2="548" stroke="#22222C"/>
  <text x="32" y="562" class="note"><tspan fill="#6E8BFF" font-weight="700">One row, every state.</tspan> Connect / Disconnect / Reconnect = ghost · destructive · ghost buttons (AOD-20 §5); the dot is the warning status mark.</text>
</svg>
