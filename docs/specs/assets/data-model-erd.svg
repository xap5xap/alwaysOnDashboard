<svg width="100%" viewBox="0 0 992 706" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>alwaysOnDashboard data model entity-relationship diagram</title>
  <desc>Eight application tables plus two Supabase-managed externals. Server-written tables (blue), written only by Edge Functions on the service role, are connections, oauth_transactions, entitlements, and proxy_cache. Client-authored tables (grey), written directly by the app under owner row-level security, are dashboards, widget_instances, kiosk_configs, and user_settings. Every application table has a user_id foreign key to auth.users(id) with ON DELETE CASCADE, shown as faint lines. Real foreign keys with cascade are drawn solid: dashboards has many widget_instances, and dashboards has a one-to-one kiosk_configs. Logical references with no database foreign key are dashed: connections holds Vault secret UUIDs into vault.secrets, and widget_instances.service_id matches connections.service through the registry seam.</desc>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    .ts{font-size:12px;fill:#5b5b5b;}
    .tl{font-size:11px;fill:#6a6a6a;}
    .bt{font-size:14px;font-weight:600;fill:#1a1a1a;}
    .pk{font-size:11.5px;fill:#1a1a1a;font-weight:600;}
    .col{font-size:11.5px;fill:#454545;}
    .edge{fill:none;stroke:#5f5f5f;stroke-width:1.5;}
    .edge-log{fill:none;stroke:#8f8f8f;stroke-width:1.3;stroke-dasharray:5 3;}
    .edge-faint{fill:none;stroke:#cfcfcf;stroke-width:1;}
    .bg-blue{fill:#dce8fb;stroke:#6e97d6;stroke-width:1;}
    .bg-neutral{fill:#f3f3f3;stroke:#c2c2c2;stroke-width:1;}
    .bg-ext{fill:#ededed;stroke:#b0b0b0;stroke-width:1;stroke-dasharray:4 3;}
    .div{stroke:#9fb6db;stroke-width:1;}
    .divn{stroke:#cfcfcf;stroke-width:1;}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0.5" y="0.5" width="991" height="705" rx="10" fill="#ffffff" stroke="#e6e6e6"/>

  <!-- faint user_id FK lines: auth.users -> every app table -->
  <path d="M393 80 L140 92" class="edge-faint"/>
  <path d="M410 80 L140 250" class="edge-faint"/>
  <path d="M427 80 L140 364" class="edge-faint"/>
  <path d="M444 80 L140 486" class="edge-faint"/>
  <path d="M560 80 L840 92" class="edge-faint"/>
  <path d="M574 80 L840 196" class="edge-faint"/>
  <path d="M556 80 L840 346" class="edge-faint"/>
  <path d="M588 80 L840 486" class="edge-faint"/>

  <!-- logical: widget_instances.service_id <-> connections.service (no FK) -->
  <path d="M246 205 H734" class="edge-log"/>
  <text x="490" y="198" text-anchor="middle" class="tl">service_id &#8596; service &#183; logical &#183; no FK</text>

  <!-- logical: connections secret refs -> vault.secrets (uuid, no FK) -->
  <path d="M140 232 V647 H360" class="edge-log" marker-end="url(#arrow)"/>
  <text x="250" y="639" text-anchor="middle" class="tl">secret refs &#183; uuid &#183; no FK</text>

  <!-- FK: dashboards 1--inf widget_instances -->
  <path d="M840 176 V196" class="edge" marker-end="url(#arrow)"/>
  <text x="852" y="190" class="ts">1&#8211;&#8734;</text>

  <!-- FK: dashboards 1--1 kiosk_configs -->
  <path d="M946 134 H972 V405 H946" class="edge" marker-end="url(#arrow)"/>
  <text x="978" y="272" class="ts">1&#8211;1</text>

  <!-- ===== auth.users (external) ===== -->
  <rect x="383" y="24" width="214" height="56" rx="8" class="bg-ext"/>
  <text x="395" y="46" class="bt">auth.users</text>
  <text x="395" y="64" class="col">id  PK  &#183;  Supabase Auth (managed)</text>

  <!-- ===== connections (server) ===== -->
  <rect x="34" y="92" width="212" height="140" rx="8" class="bg-blue"/>
  <text x="46" y="113" class="bt">connections</text>
  <line x1="34" y1="120" x2="246" y2="120" class="div"/>
  <text x="46" y="138" class="pk">id  PK</text>
  <text x="46" y="156" class="col">user_id  FK &#8594; users</text>
  <text x="46" y="174" class="col">service &#183; auth_class &#183; status</text>
  <text x="46" y="192" class="col">scopes[] &#183; expires_at</text>
  <text x="46" y="210" class="col">access/refresh_secret_id &#8674;</text>
  <text x="46" y="228" class="col">config jsonb &#183; uniq(user,service)</text>

  <!-- ===== oauth_transactions (server) ===== -->
  <rect x="34" y="250" width="212" height="96" rx="8" class="bg-blue"/>
  <text x="46" y="271" class="bt">oauth_transactions</text>
  <line x1="34" y1="278" x2="246" y2="278" class="div"/>
  <text x="46" y="296" class="pk">id  PK</text>
  <text x="46" y="314" class="col">user_id  FK &#8594; users</text>
  <text x="46" y="332" class="col">state &#183; code_verifier &#183; expires_at</text>

  <!-- ===== entitlements (server) ===== -->
  <rect x="34" y="364" width="212" height="104" rx="8" class="bg-blue"/>
  <text x="46" y="385" class="bt">entitlements</text>
  <line x1="34" y1="392" x2="246" y2="392" class="div"/>
  <text x="46" y="410" class="pk">user_id  PK / FK &#8594; users</text>
  <text x="46" y="428" class="col">tier &#183; status</text>
  <text x="46" y="446" class="col">current_period_end</text>
  <text x="46" y="464" class="col">last_event_id &#183; last_event_ms</text>

  <!-- ===== proxy_cache (server) ===== -->
  <rect x="34" y="486" width="212" height="110" rx="8" class="bg-blue"/>
  <text x="46" y="507" class="bt">proxy_cache</text>
  <line x1="34" y1="514" x2="246" y2="514" class="div"/>
  <text x="46" y="532" class="pk">(user_id,service,widget,hash) PK</text>
  <text x="46" y="550" class="col">user_id  FK &#8594; users</text>
  <text x="46" y="568" class="col">payload jsonb &#183; fetched_at</text>
  <text x="46" y="586" class="col">expires_at  &#8804; fetched_at+900s</text>

  <!-- ===== dashboards (client) ===== -->
  <rect x="734" y="92" width="212" height="84" rx="8" class="bg-neutral"/>
  <text x="746" y="113" class="bt">dashboards</text>
  <line x1="734" y1="120" x2="946" y2="120" class="divn"/>
  <text x="746" y="138" class="pk">id  PK</text>
  <text x="746" y="156" class="col">user_id  FK &#8594; users</text>
  <text x="746" y="174" class="col">name &#183; position</text>

  <!-- ===== widget_instances (client) ===== -->
  <rect x="734" y="196" width="212" height="130" rx="8" class="bg-neutral"/>
  <text x="746" y="217" class="bt">widget_instances</text>
  <line x1="734" y1="224" x2="946" y2="224" class="divn"/>
  <text x="746" y="242" class="pk">id  PK</text>
  <text x="746" y="260" class="col">dashboard_id  FK &#8594; dashboards</text>
  <text x="746" y="278" class="col">user_id  FK &#8594; users</text>
  <text x="746" y="296" class="col">service_id &#183; widget_type &#183; size</text>
  <text x="746" y="314" class="col">config &#183; rect &#183; refresh  jsonb</text>

  <!-- ===== kiosk_configs (client) ===== -->
  <rect x="734" y="346" width="212" height="118" rx="8" class="bg-neutral"/>
  <text x="746" y="367" class="bt">kiosk_configs</text>
  <line x1="734" y1="374" x2="946" y2="374" class="divn"/>
  <text x="746" y="392" class="pk">dashboard_id  PK / FK</text>
  <text x="746" y="410" class="col">user_id  FK &#8594; users</text>
  <text x="746" y="428" class="col">schedule &#183; curve &#183; profile jsonb</text>
  <text x="746" y="446" class="col">keep_awake &#183; control_backlight</text>

  <!-- ===== user_settings (client) ===== -->
  <rect x="734" y="486" width="212" height="92" rx="8" class="bg-neutral"/>
  <text x="746" y="507" class="bt">user_settings</text>
  <line x1="734" y1="514" x2="946" y2="514" class="divn"/>
  <text x="746" y="532" class="pk">user_id  PK / FK &#8594; users</text>
  <text x="746" y="550" class="col">theme</text>
  <text x="746" y="568" class="col">preferences jsonb</text>

  <!-- ===== vault.secrets (external) ===== -->
  <rect x="360" y="612" width="260" height="70" rx="8" class="bg-ext"/>
  <text x="372" y="634" class="bt">vault.secrets</text>
  <line x1="360" y1="641" x2="620" y2="641" class="divn"/>
  <text x="372" y="659" class="col">id  PK  &#183;  Supabase Vault (managed)</text>
  <text x="372" y="675" class="col">token / key ciphertext &#183; never in app tables</text>

  <!-- ===== legend ===== -->
  <rect x="660" y="600" width="312" height="92" rx="8" fill="#fbfbfb" stroke="#e0e0e0"/>
  <text x="672" y="620" class="ts" style="font-weight:600;fill:#1a1a1a;">Legend</text>
  <rect x="672" y="628" width="14" height="11" rx="2" class="bg-blue"/>
  <text x="692" y="638" class="tl">server-written (Edge / service role)</text>
  <rect x="672" y="645" width="14" height="11" rx="2" class="bg-neutral"/>
  <text x="692" y="655" class="tl">client-authored (RLS owner CRUD)</text>
  <path d="M672 668 H690" class="edge"/>
  <text x="696" y="671" class="tl">FK, cascade</text>
  <path d="M788 668 H806" class="edge-log"/>
  <text x="812" y="671" class="tl">logical, no FK</text>
  <path d="M672 684 H690" class="edge-faint"/>
  <text x="696" y="687" class="tl">user_id FK &#8594; auth.users</text>
</svg>
